    link: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
    check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  };

  // ============================================================
  // STORAGE
  // ============================================================
  const Store = {
    load() { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; } },
    save(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); },
    reset() { localStorage.removeItem(STORAGE_KEY); },
  };

  // ============================================================
  // STATE
  // ============================================================
  const initialState = {
    route: 'dashboard',
    theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
    sheetUrl: DEFAULT_SHEET_URL,
    lastSync: null,
    gzg: [],
    aktionen: [],
    nextId: { gzg: 1, aktion: 1 },
    filter: { search: '', status: '', hersteller: '', kaufstaette: '', von: '', bis: '', sortBy: 'createdAt', sortDir: 'desc', page: 1, pageSize: 25 },
    importSelection: [],
    importSearch: '',
    showFilter: false,
  };

  let state = (() => {
    const s = Store.load();
    if (!s) return initialState;
    return { ...initialState, ...s };
  })();

  function persist() { Store.save(state); }
  function setState(patch) { state = { ...state, ...patch }; persist(); render(); }

  // ============================================================
  // UTILS
  // ============================================================
  function fmtCurrency(v) {
    if (v == null || isNaN(v)) return '–';
    return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(v);
  }
  function fmtDate(s) {
    if (!s) return '–';
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }
  function toInputDate(s) {
    if (!s) return '';
    const d = parseDate(s);
    return d ? d.toISOString().substring(0, 10) : '';
  }
  // Parse DD.MM.YYYY or YYYY-MM-DD
  function parseDate(s) {
    if (!s) return null;
    if (s instanceof Date) return s;
    const str = String(s).trim();
    if (!str) return null;
    let m = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
    if (m) {
      const day = parseInt(m[1], 10), month = parseInt(m[2], 10) - 1;
      let year = parseInt(m[3], 10);
      if (year < 100) year += 2000;
      const d = new Date(year, month, day);
      return isNaN(d.getTime()) ? null : d;
    }
    m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) {
      const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
      return isNaN(d.getTime()) ? null : d;
    }
    const d = new Date(str);
    return isNaN(d.getTime()) ? null : d;
  }
  function daysUntil(s) {
    const d = parseDate(s);
    if (!d) return null;
    return Math.ceil((d.getTime() - Date.now()) / 86400000);
  }
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }

  // Versucht Cashback-Betrag aus Beschreibung zu extrahieren
  function extractCashbackBetrag(text) {
    if (!text) return null;
    const m = String(text).match(/(\d+[,.]\d{2}|\d+)\s*€/);
    if (m) return parseFloat(m[1].replace(',', '.'));
    return null;
  }

  // ============================================================
  // TOAST & MODAL
  // ============================================================
  function toast(msg, type = 'info') {
    const colors = {
      success: 'bg-emerald-50 text-emerald-900 border-emerald-200 dark:bg-emerald-950 dark:text-emerald-200 dark:border-emerald-900',
      error: 'bg-red-50 text-red-900 border-red-200 dark:bg-red-950 dark:text-red-200 dark:border-red-900',
      info: 'bg-white text-slate-900 border-slate-200 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-700',
    };
    const div = document.createElement('div');
    div.className = `toast flex items-start gap-3 rounded-lg border px-4 py-3 shadow-lg ${colors[type]}`;
    div.innerHTML = `<p class="flex-1 text-sm">${esc(msg)}</p>`;
    document.getElementById('toasts').appendChild(div);
    setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity .2s'; setTimeout(() => div.remove(), 200); }, 4000);
  }

  function openModal({ title, body, size = 'md' }) {
    const sz = { sm: 'max-w-md', md: 'max-w-xl', lg: 'max-w-3xl', xl: 'max-w-5xl' }[size];
    const root = document.getElementById('modals');
    root.innerHTML = `
      <div class="modal-enter fixed inset-0 z-40 flex items-end sm:items-center justify-center bg-black/50 sm:p-4 backdrop-blur-sm" data-modal-backdrop>
        <div class="card w-full ${sz} max-h-[92vh] flex flex-col overflow-hidden rounded-t-xl sm:rounded-xl">

            <h2 class="text-lg font-semibold">${esc(title)}</h2>

          </div>
          <div class="flex-1 overflow-y-auto p-5">${body}</div>
        </div>
      </div>`;
    root.querySelector('[data-modal-backdrop]').addEventListener('click', e => { if (e.target.matches('[data-modal-backdrop]')) closeModal(); });
    root.querySelector('[data-modal-close]').addEventListener('click', closeModal);
  }
  function closeModal() { document.getElementById('modals').innerHTML = ''; }

  function applyTheme() { document.documentElement.classList.toggle('dark', state.theme === 'dark'); }

  // ============================================================
  // GOOGLE SHEETS SYNC
  // ============================================================
  // Extracts spreadsheet ID + gid from a Google Sheets URL and
  // returns the public CSV-export endpoint that supports CORS.
  function buildGSheetCsvUrl(url) {
    const m = String(url).match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if (!m) return null;
    const id = m[1];
    const gMatch = String(url).match(/[?&#]gid=(\d+)/);
    const gid = gMatch ? gMatch[1] : '0';
    return `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&gid=${gid}`;
  }

  // Tries direct fetch first, then falls back via public CORS proxy.
  // Google Sheets only sends Access-Control-Allow-Origin for sheets that have
  // been "Published to web" — for normal "anyone with link" sheets we need the
  // proxy.
  async function fetchCsvWithFallback(csvUrl) {
    try {
      const res = await fetch(csvUrl);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.text();
    } catch (e) {
      // Fallback via public CORS proxy
      const proxied = 'https://corsproxy.io/?' + encodeURIComponent(csvUrl);
      const res = await fetch(proxied);
      if (!res.ok) throw new Error('Proxy HTTP ' + res.status);
      return await res.text();
    }
  }

  async function syncFromGoogleSheets() {
    const url = state.sheetUrl;
    if (!url) { toast('Keine Sheet-URL hinterlegt. Bitte in den Einstellungen setzen.', 'error'); return; }
    const csvUrl = buildGSheetCsvUrl(url);
    if (!csvUrl) { toast('Ungültige Google-Sheets-URL.', 'error'); return; }
    toast('Synchronisiere…', 'info');
    try {
      const text = await fetchCsvWithFallback(csvUrl);
      const parsed = parseGZGCsv(text);
      if (parsed.length === 0) throw new Error('Keine Datenzeilen gefunden');
      mergeGZG(parsed);
      setState({ lastSync: new Date().toISOString() });
      toast(`${parsed.length} GZG-Aktionen synchronisiert.`, 'success');
    } catch (e) {
      console.error(e);
      toast('Sync fehlgeschlagen: ' + e.message + '. Tipp: CSV manuell von Google Sheets herunterladen und über "GZG-Liste → CSV laden" hochladen.', 'error');
    }
  }

  // Imports a manually downloaded CSV file (same format as the Google Sheet)
  function importCsvFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = parseGZGCsv(String(e.target.result));
        if (parsed.length === 0) throw new Error('Keine Datenzeilen erkannt');
        mergeGZG(parsed);
        setState({ lastSync: new Date().toISOString() });
        toast(`${parsed.length} GZG-Aktionen aus CSV geladen.`, 'success');
      } catch (err) {
        toast('CSV-Import fehlgeschlagen: ' + err.message, 'error');
      }
    };
    reader.readAsText(file, 'utf-8');
  }

  // CSV parser supporting quoted cells and ; or , separators
  function parseCsvLine(line, sep) {
    const out = []; let cur = ''; let q = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (q) {
        if (c === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (c === '"') q = false;
        else cur += c;
      } else {
        if (c === '"') q = true;
        else if (c === sep) { out.push(cur); cur = ''; }
        else cur += c;
      }
    }
    out.push(cur);
    return out;
  }

  // Parses a CSV from the GZG Google Sheet into normalized objects.
  //
  // The mydealz-GZG sheet has a fixed column layout (verified against the
  // source). We use FIXED positions because the heuristic header search was
  // unreliable (e.g. "Zeitpunkt" in column D was being picked up as
  // Aktions-ende, which is column E). Heuristics only kick in if the sheet
  // structure changes in the future.
  //
  // Columns:
  // A=0 Produktbild, B=1 Aktionsbeschreibung, C=2 Kontingent,
  // D=3 Zeitpunkt, E=4 Aktions-ende, F=5 Einsendeschluss,
  // G=6 Einreichungs-frist, H=7 Art der Teilnahme, I=8 Begründung,
  // J=9 Art des Kaufbeleges, K=10 SMS Bestätigung, L=11 Aktionsseite,
  // M=12 mydealz Link, N=13 abwickelnde Agentur
  const GZG_COLS = {
    produkt: 1,
    kontingent: 2,
    aktionsende: 4,
    einsendeschluss: 5,
    einreichungsfrist: 6,
    teilnahme: 7,
    kaufbeleg: 9,
    sms: 10,
    aktionsseite: 11,
    mydealz: 12,
    agentur: 13,
  };

  function parseGZGCsv(text) {
    if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);
    const lines = text.split(/\r?\n/).filter(l => l.length > 0);
    if (lines.length < 2) return [];
    const sep = (lines[0].split(';').length > lines[0].split(',').length) ? ';' : ',';

    const c = GZG_COLS;
    const out = [];
    let skipped = 0;

    // i=0 is the header row; data starts at i=1
    for (let i = 1; i < lines.length; i++) {
      const cells = parseCsvLine(lines[i], sep);
      const produkt = (cells[c.produkt] || '').trim();
      if (!produkt) continue;

      const aktionsseite = (cells[c.aktionsseite] || '').trim();
      const einsendeschluss = (cells[c.einsendeschluss] || '').trim();
      const aktionsende = (cells[c.aktionsende] || '').trim();

      // Filter: rows without an Aktionsseite-Link are not real actions
      // (notes, disclaimers, footer rows like 59-65).
      // Also require at least one date to be present.
      if (!aktionsseite || (!einsendeschluss && !aktionsende)) {
        skipped++;
        continue;
      }

      out.push({
        produktname: produkt,
        kontingent: (cells[c.kontingent] || '').trim() || null,
        aktionsende: aktionsende || null,
        einsendeschluss: einsendeschluss || null,
        einreichungsfrist: (cells[c.einreichungsfrist] || '').trim() || null,
        teilnahme: (cells[c.teilnahme] || '').trim() || null,
        kaufbeleg: (cells[c.kaufbeleg] || '').trim() || null,
        sms: /ja|yes/i.test((cells[c.sms] || '').trim()),
        aktionsseite,
        mydealzLink: (cells[c.mydealz] || '').trim() || null,
        agentur: (cells[c.agentur] || '').trim() || null,
        hersteller: extractHersteller(produkt),
        cashbackBetrag: extractCashbackBetrag(produkt),
      });
    }
    if (skipped > 0) console.info(`GZG-Parser: ${skipped} Zeilen übersprungen (keine Aktionsseite oder kein Datum).`);
    return out;
  }

  // Heuristic: many GZG entries start with the brand in CAPS.
  function extractHersteller(produkt) {
    const m = String(produkt).match(/^([A-ZÄÖÜ][A-ZÄÖÜ0-9&'.\- ]{1,25})\s+\S/);
    return m ? m[1].trim() : null;
  }

  // Extracts a domain (without www.) from a URL string.
  function extractDomain(url) {
    if (!url) return null;
    try {
      const clean = String(url).trim();
      const u = new URL(clean.startsWith('http') ? clean : 'https://' + clean);
      return u.hostname.replace(/^www\./, '');
    } catch { return null; }
  }

  // Google favicon service — works without CORS, returns a tiny brand icon.
  function faviconUrl(domain, size = 64) {
    if (!domain) return '';
    return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=${size}`;
  }

  // Color avatar for items without a usable URL (deterministic by name)
  function initialAvatar(name) {
    const ch = (name && name[0] ? name[0] : '?').toUpperCase();
    let h = 0;
    for (let i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) % 360;
    return `<div class="w-14 h-14 rounded-xl flex items-center justify-center text-white font-bold text-xl flex-none shadow-sm" style="background: linear-gradient(135deg, hsl(${h},70%,55%), hsl(${(h+40)%360},70%,40%));">${esc(ch)}</div>`;
  }

  function logoForGzg(g) {
    const dom = extractDomain(g.aktionsseite);
    if (dom) {
      return `<div class="w-14 h-14 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center flex-none shadow-sm overflow-hidden">
        <img src="${faviconUrl(dom, 64)}" alt="" class="w-9 h-9" loading="lazy" onerror="this.parentElement.outerHTML=this.parentElement.dataset.fallback" data-fallback='${initialAvatar(g.hersteller || g.produktname).replace(/'/g, "&apos;")}' />
      </div>`;
    }
    return initialAvatar(g.hersteller || g.produktname);
  }

  // Merge fresh entries into state.gzg by produktname.
  // Preserves entries that have already been imported to a CashbackAktion
  // (so the user doesn't lose tracking even if the source sheet changes).
  // Drops stale non-imported entries that are no longer in the source.
  function mergeGZG(fresh) {
    const freshNames = new Set(fresh.map(f => f.produktname));
    // 1. Keep imported entries even if they vanished from the source
    // 2. Drop non-imported entries that are no longer in the source
    let kept = state.gzg.filter(g => g.importiert || freshNames.has(g.produktname));
    let nextId = state.nextId.gzg;
    for (const f of fresh) {
      const existing = kept.find(g => g.produktname === f.produktname);
      if (existing) {
        // Update existing fields but preserve id and importiert flag
        Object.assign(existing, f, { id: existing.id, importiert: existing.importiert });
      } else {
        kept.push({ id: nextId++, ...f, importiert: false });
      }
    }
    setState({ gzg: kept, nextId: { ...state.nextId, gzg: nextId } });
  }

  // ============================================================
  // CASHBACK / IMPORT
  // ============================================================
  function isDuplicate(g) {
    return state.aktionen.some(a => a.gzgId === g.id || a.produktname === g.produktname);
  }

  function importGZG(ids) {
    let imported = 0, skipped = 0;
    const newGzg = state.gzg.map(g => ({ ...g }));
    const newAktionen = [...state.aktionen];
    let next = state.nextId.aktion;

    for (const id of ids) {
      const g = newGzg.find(x => x.id === id);
      if (!g || g.importiert) { skipped++; continue; }
      if (isDuplicate(g)) { g.importiert = true; skipped++; continue; }

      newAktionen.push({
        id: next++,
        produktname: g.produktname,
        hersteller: g.hersteller || null,
        cashbackBetrag: g.cashbackBetrag ?? 0,
        kaufstaette: null,
        kaufdatum: null,
        teilnahmedatum: null,
        cashbackErhaltenAm: null,
        einsendeschluss: g.einsendeschluss || null,
        aktionsende: g.aktionsende || null,
        aktionsseite: g.aktionsseite || null,
        mydealzLink: g.mydealzLink || null,
        agentur: g.agentur || null,
        belegnummer: null,
        teilnahme: g.teilnahme || null,
        kaufbeleg: g.kaufbeleg || null,
        status: 'OFFEN',
        bemerkungen: null,
        gzgId: g.id,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      });
      g.importiert = true;
      imported++;
    }
    setState({ gzg: newGzg, aktionen: newAktionen, nextId: { ...state.nextId, aktion: next }, importSelection: [] });
    if (imported > 0) toast(`${imported} Aktion${imported === 1 ? '' : 'en'} importiert.`, 'success');
    if (skipped > 0) toast(`${skipped} übersprungen (Duplikate).`, 'info');
  }

  function saveAktion(values, id) {
    const data = {
      produktname: values.produktname.trim(),
      hersteller: values.hersteller.trim() || null,
      cashbackBetrag: parseFloat(String(values.cashbackBetrag).replace(',', '.')) || 0,
      kaufstaette: values.kaufstaette.trim() || null,
      kaufdatum: values.kaufdatum || null,
      teilnahmedatum: values.teilnahmedatum || null,
      cashbackErhaltenAm: values.cashbackErhaltenAm || null,
      einsendeschluss: values.einsendeschluss || null,
      aktionsende: values.aktionsende || null,
      aktionsseite: values.aktionsseite.trim() || null,
      mydealzLink: values.mydealzLink.trim() || null,
      agentur: values.agentur.trim() || null,
      belegnummer: values.belegnummer.trim() || null,
      status: values.status,
      bemerkungen: values.bemerkungen.trim() || null,
    };
    if (id != null) {
      setState({ aktionen: state.aktionen.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a) });
      toast('Aktion aktualisiert.', 'success');
    } else {
      const a = { id: state.nextId.aktion, gzgId: null, teilnahme: null, kaufbeleg: null, ...data, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
      setState({ aktionen: [...state.aktionen, a], nextId: { ...state.nextId, aktion: state.nextId.aktion + 1 } });
      toast('Aktion angelegt.', 'success');
    }
    closeModal();
  }

  function deleteAktion(id) {
    const a = state.aktionen.find(x => x.id === id);
    if (!a) return;
    let newGzg = state.gzg;
    if (a.gzgId) newGzg = state.gzg.map(g => g.id === a.gzgId ? { ...g, importiert: false } : g);
    setState({ aktionen: state.aktionen.filter(x => x.id !== id), gzg: newGzg });
    closeModal();
    toast('Aktion gelöscht.', 'success');
  }

  // ============================================================
  // FILTER / STATS
  // ============================================================
  function getFiltered() {
    let items = [...state.aktionen];
    const f = state.filter;
    if (f.search) {
      const s = f.search.toLowerCase();
      items = items.filter(a =>
        a.produktname.toLowerCase().includes(s) ||
        (a.bemerkungen || '').toLowerCase().includes(s) ||
        (a.hersteller || '').toLowerCase().includes(s) ||
        (a.kaufstaette || '').toLowerCase().includes(s)
      );
    }
    if (f.status) items = items.filter(a => a.status === f.status);
    if (f.hersteller) items = items.filter(a => a.hersteller === f.hersteller);
    if (f.kaufstaette) items = items.filter(a => a.kaufstaette === f.kaufstaette);
    if (f.von) items = items.filter(a => a.kaufdatum && a.kaufdatum >= f.von);
    if (f.bis) items = items.filter(a => a.kaufdatum && a.kaufdatum <= f.bis);
    items.sort((a, b) => {
      const av = a[f.sortBy], bv = b[f.sortBy];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      const cmp = av < bv ? -1 : av > bv ? 1 : 0;
      return f.sortDir === 'asc' ? cmp : -cmp;
    });
    return items;
  }
  function r2(n) { return Math.round(n * 100) / 100; }
  function getStats() {
    const items = state.aktionen;
    const sumBy = (s) => items.filter(i => i.status === s).reduce((sum, i) => sum + (i.cashbackBetrag || 0), 0);
    const cnt = (s) => items.filter(i => i.status === s).length;
    return {
      anzahl: { gesamt: items.length, offen: cnt('OFFEN'), eingereicht: cnt('EINGEREICHT'), erhalten: cnt('ERHALTEN'), abgelehnt: cnt('ABGELEHNT') },
      summen: { gesamt: r2(items.reduce((s, i) => s + (i.cashbackBetrag || 0), 0)), offen: r2(sumBy('OFFEN')), eingereicht: r2(sumBy('EINGEREICHT')), erhalten: r2(sumBy('ERHALTEN')), ausstehend: r2(sumBy('OFFEN') + sumBy('EINGEREICHT')) },
    };
  }
  function getReminders() {
    return state.aktionen.filter(a => a.status === 'OFFEN' || a.status === 'EINGEREICHT')
      .map(a => ({ ...a, daysLeft: daysUntil(a.einsendeschluss) }))
      .filter(a => a.daysLeft != null && a.daysLeft <= 14)
      .sort((a, b) => a.daysLeft - b.daysLeft);
  }
  function getMonthStats() {
    const map = new Map();
    for (const a of state.aktionen) {
      const ref = a.cashbackErhaltenAm || a.kaufdatum || a.createdAt;
      const key = (ref || '').substring(0, 7);
      if (!key) continue;
      map.set(key, (map.get(key) || 0) + (a.cashbackBetrag || 0));
    }
    return Array.from(map.entries()).sort().map(([m, b]) => ({ monat: m, betrag: r2(b) }));
  }
  function getHerstellerStats() {
    const map = new Map();
    for (const a of state.aktionen) {
      const k = a.hersteller || 'Unbekannt';
      const cur = map.get(k) || { betrag: 0, anzahl: 0 };
      cur.betrag += a.cashbackBetrag || 0; cur.anzahl++;
      map.set(k, cur);
    }
    return Array.from(map.entries()).map(([h, v]) => ({ hersteller: h, betrag: r2(v.betrag), anzahl: v.anzahl })).sort((a, b) => b.betrag - a.betrag);
  }
  function uniqueValues(field) {
    const set = new Set();
    state.aktionen.forEach(a => { if (a[field]) set.add(a[field]); });
    state.gzg.forEach(g => { if (g[field]) set.add(g[field]); });
    return Array.from(set).sort();
  }

  // ============================================================
  // CSV Export
  // ============================================================
  function exportCSV() {
    const rows = [
      ['ID', 'Produkt', 'Hersteller', 'Kaufstätte', 'Kaufdatum', 'Teilnahmedatum', 'Cashback', 'Cashback erhalten am', 'Einsendeschluss', 'Aktionsende', 'Belegnummer', 'Agentur', 'Aktionsseite', 'mydealz', 'Status', 'Bemerkungen'],
      ...state.aktionen.map(i => [i.id, i.produktname, i.hersteller || '', i.kaufstaette || '', i.kaufdatum || '', i.teilnahmedatum || '', i.cashbackBetrag, i.cashbackErhaltenAm || '', i.einsendeschluss || '', i.aktionsende || '', i.belegnummer || '', i.agentur || '', i.aktionsseite || '', i.mydealzLink || '', i.status, i.bemerkungen || '']),
    ];
    const csv = '﻿' + rows.map(r => r.map(c => {
      const s = String(c);
      return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(';')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `gzg-aktionen-${new Date().toISOString().substring(0, 10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  // ============================================================
  // RENDER: AKTIONEN (meine Cashback-Liste)
  // ============================================================
  function renderAktionen() {
    const items = getFiltered();
    const f = state.filter;
    const total = items.length;
    const totalPages = Math.max(1, Math.ceil(total / f.pageSize));
    const page = Math.min(f.page, totalPages);
    const pageItems = items.slice((page - 1) * f.pageSize, page * f.pageSize);
    const activeFilters = ['status', 'hersteller', 'kaufstaette', 'von', 'bis'].filter(k => f[k]).length;
    const sortIcon = (col) => f.sortBy === col ? (f.sortDir === 'asc' ? I.arrowUp : I.arrowDown) : '';

    return `
      <div class="space-y-4">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <h1 class="text-2xl font-bold">Meine Aktionen</h1>
            <p class="text-sm text-slate-500">${total} Einträge</p>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-secondary" data-action="exportCSV">${I.download} CSV</button>
            <button class="btn btn-primary" data-action="newAktion">${I.plus} Neu</button>
          </div>
        </div>

        <div class="card p-4 space-y-3">
          <div class="flex flex-wrap items-center gap-2">
            <div class="relative flex-1 min-w-[220px]">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${I.search}</span>
              <input class="input pl-9" placeholder="Suche..." value="${esc(f.search)}" data-action="search-input" />
              ${f.search ? `<button class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400" data-action="clearSearch">${I.x}</button>` : ''}
            </div>
            <button class="btn btn-secondary relative" data-action="toggleFilter">
              ${I.filter} Filter
              ${activeFilters > 0 ? `<span class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-brand-600 text-xs text-white">${activeFilters}</span>` : ''}
            </button>
          </div>
          ${state.showFilter ? `
            <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4 border-t border-slate-200 dark:border-slate-800 pt-3">
              <label class="block">
                <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Status</span>
                <select class="input" data-action="filter" data-key="status">
                  <option value="">Alle</option>
                  ${STATUS_LIST.map(s => `<option value="${s}" ${f.status === s ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('')}
                </select>
              </label>
              <label class="block">
                <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Hersteller</span>
                <select class="input" data-action="filter" data-key="hersteller">
                  <option value="">Alle</option>
                  ${uniqueValues('hersteller').map(h => `<option value="${esc(h)}" ${f.hersteller === h ? 'selected' : ''}>${esc(h)}</option>`).join('')}
                </select>
              </label>
              <label class="block">
                <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Kaufstätte</span>
                <select class="input" data-action="filter" data-key="kaufstaette">
                  <option value="">Alle</option>
                  ${uniqueValues('kaufstaette').map(k => `<option value="${esc(k)}" ${f.kaufstaette === k ? 'selected' : ''}>${esc(k)}</option>`).join('')}
                </select>
              </label>
              <div class="grid grid-cols-2 gap-2">
                <label class="block">
                  <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Von</span>
                  <input type="date" class="input" value="${f.von}" data-action="filter" data-key="von" />
                </label>
                <label class="block">
                  <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Bis</span>
                  <input type="date" class="input" value="${f.bis}" data-action="filter" data-key="bis" />
                </label>
              </div>
              ${activeFilters > 0 ? `<button class="btn btn-ghost self-end justify-self-start" data-action="resetFilter">Filter zurücksetzen</button>` : ''}
            </div>` : ''}
        </div>

        <div class="card overflow-hidden">
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-50 dark:bg-slate-900">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="produktname"><span class="inline-flex items-center gap-1">Produkt ${sortIcon('produktname')}</span></th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Kaufstätte</th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="kaufdatum"><span class="inline-flex items-center gap-1">Kaufdatum ${sortIcon('kaufdatum')}</span></th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="einsendeschluss"><span class="inline-flex items-center gap-1">Einsendeschluss ${sortIcon('einsendeschluss')}</span></th>
                  <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="cashbackBetrag"><span class="inline-flex items-center gap-1 justify-end w-full">Cashback ${sortIcon('cashbackBetrag')}</span></th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="status"><span class="inline-flex items-center gap-1">Status ${sortIcon('status')}</span></th>
                  <th class="px-4 py-3"></th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
                ${pageItems.length === 0
                  ? `<tr><td colspan="7" class="p-12 text-center text-slate-500">Keine Aktionen gefunden.</td></tr>`
                  : pageItems.map(a => {
                      const dl = daysUntil(a.einsendeschluss);
                      let dlBadge = '';
                      if (dl != null && (a.status === 'OFFEN' || a.status === 'EINGEREICHT')) {
                        const cls = dl < 0 ? 'badge-warn' : dl <= 3 ? 'badge-warn' : dl <= 14 ? 'badge-soon' : '';
                        if (cls) {
                          const txt = dl < 0 ? `-${Math.abs(dl)}d` : dl === 0 ? 'heute' : `${dl}d`;
                          dlBadge = `<span class="badge ${cls} ml-2">${txt}</span>`;
                        }
                      }
                      const dom = extractDomain(a.aktionsseite);
                      const tinyLogo = dom
                        ? `<img src="${faviconUrl(dom, 32)}" alt="" class="w-5 h-5 rounded inline-block mr-2 align-middle" loading="lazy" onerror="this.style.display='none'" />`
                        : '';
                      return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-900/40">
                        <td class="px-4 py-3 font-medium">
                          <div class="flex items-center">${tinyLogo}<span>${esc(a.produktname)}</span></div>
                          ${a.hersteller ? `<div class="text-xs text-slate-500 ml-7">${esc(a.hersteller)}</div>` : ''}
                        </td>
                        <td class="px-4 py-3">${esc(a.kaufstaette || '–')}</td>
                        <td class="px-4 py-3">${fmtDate(a.kaufdatum)}</td>
                        <td class="px-4 py-3">${fmtDate(a.einsendeschluss)}${dlBadge}</td>
                        <td class="px-4 py-3 text-right tabular-nums">${fmtCurrency(a.cashbackBetrag)}</td>
                        <td class="px-4 py-3"><span class="badge badge-${a.status}">${STATUS_LABEL[a.status]}</span></td>
                        <td class="px-4 py-3 text-right">
                          <div class="flex justify-end gap-1">
                            <button class="btn btn-ghost p-1.5" data-action="editAktion" data-id="${a.id}">${I.pencil}</button>
                            <button class="btn btn-ghost p-1.5 text-red-600" data-action="deleteAktion" data-id="${a.id}">${I.trash}</button>
                          </div>
                        </td>
                      </tr>`;
                    }).join('')}
              </tbody>
            </table>
          </div>
          ${totalPages > 1 ? `
            <div class="flex items-center justify-between border-t border-slate-200 dark:border-slate-800 px-4 py-3 text-sm">
              <p class="text-slate-500">Seite ${page} von ${totalPages}</p>
              <div class="flex gap-1">
                <button class="btn btn-ghost" ${page <= 1 ? 'disabled' : ''} data-action="page" data-dir="-1">Zurück</button>
                <button class="btn btn-ghost" ${page >= totalPages ? 'disabled' : ''} data-action="page" data-dir="1">Weiter</button>
              </div>
            </div>` : ''}
        </div>
      </div>`;
  }

  // ============================================================
  // RENDER: GZG-LISTE (Import)
  // ============================================================
  function renderImport() {
    let items = state.gzg.filter(g => !g.importiert);
    if (state.importSearch) {
      const s = state.importSearch.toLowerCase();
      items = items.filter(g =>
        g.produktname.toLowerCase().includes(s) ||
        (g.hersteller || '').toLowerCase().includes(s) ||
        (g.agentur || '').toLowerCase().includes(s)
      );
    }
    items.sort((a, b) => {
      const da = parseDate(a.einsendeschluss);
      const db = parseDate(b.einsendeschluss);
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return da - db;
    });

    const allSelected = items.length > 0 && items.every(i => state.importSelection.includes(i.id));

    return `
      <div class="space-y-4">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <h1 class="text-2xl font-bold">GZG-Liste</h1>
            <p class="text-sm text-slate-500">${items.length} verfügbare Aktionen · sortiert nach Einsendeschluss</p>
          </div>
          <div class="flex gap-2">
            <label class="btn btn-secondary cursor-pointer">${I.upload} CSV laden<input type="file" accept=".csv,text/csv" class="hidden" data-action="csvUpload" /></label>
            <button class="btn btn-secondary" data-action="sync">${I.refresh} Sync</button>
            <button class="btn btn-primary" ${state.importSelection.length === 0 ? 'disabled' : ''} data-action="doImport">
              ${I.download} Importieren (${state.importSelection.length})
            </button>
          </div>
        </div>

        <div class="card p-4">
          <div class="flex flex-wrap items-center gap-2">
            <div class="relative flex-1 min-w-[220px]">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${I.search}</span>
              <input class="input pl-9" placeholder="Produkt, Hersteller, Agentur..." value="${esc(state.importSearch)}" data-action="importSearch" />
              ${state.importSearch ? `<button class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400" data-action="clearImportSearch">${I.x}</button>` : ''}
            </div>
          </div>
        </div>

        ${state.gzg.length === 0 ? `
          <div class="card p-8 text-center space-y-4">
            <p>Noch keine GZG-Aktionen geladen.</p>
            <div class="flex flex-wrap gap-2 justify-center">
              <button class="btn btn-primary" data-action="sync">${I.refresh} Sync versuchen</button>
              <label class="btn btn-secondary cursor-pointer">${I.upload} CSV-Datei laden<input type="file" accept=".csv,text/csv" class="hidden" data-action="csvUpload" /></label>
            </div>
            <div class="text-xs text-slate-500 max-w-md mx-auto space-y-2 text-left">
              <p><strong>Sync klappt nicht?</strong> Google Sheets blockiert manchmal Browser-Anfragen. Lade die CSV manuell:</p>
              <ol class="list-decimal list-inside space-y-1">
                <li>Im Google Sheet: <em>Datei → Herunterladen → CSV (.csv)</em></li>
                <li>Dann hier <strong>„CSV-Datei laden"</strong> klicken</li>
              </ol>
            </div>
          </div>
        ` : `
        <div class="flex items-center justify-between text-sm text-slate-500 px-1">
          <label class="inline-flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="h-4 w-4 cursor-pointer" ${allSelected ? 'checked' : ''} data-action="toggleAll" />
            <span>Alle auswählen</span>
          </label>
        </div>
        ${items.length === 0
          ? `<div class="card p-12 text-center text-slate-500">Keine passenden Einträge.</div>`
          : `<div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
              ${items.map(g => {
                const dl = daysUntil(g.einsendeschluss);
                let dlBadge = '';
                if (dl != null) {
                  const cls = dl < 0 ? 'badge-warn' : dl <= 3 ? 'badge-warn' : dl <= 14 ? 'badge-soon' : '';
                  const txt = dl < 0 ? `${Math.abs(dl)}d überfällig` : dl === 0 ? 'heute!' : `noch ${dl}d`;
                  dlBadge = `<span class="badge ${cls || 'badge-EINGEREICHT'}">${txt}</span>`;
                }
                const sel = state.importSelection.includes(g.id);
                return `<div class="card p-4 flex flex-col gap-3 transition-shadow hover:shadow-md ${sel ? 'ring-2 ring-brand-500' : ''}">
                  <div class="flex items-start gap-3">
                    ${logoForGzg(g)}
                    <div class="flex-1 min-w-0">
                      <h3 class="font-semibold leading-snug line-clamp-2" title="${esc(g.produktname)}">${esc(g.produktname)}</h3>
                      <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1 text-xs">
                        ${g.hersteller ? `<span class="text-slate-500">${esc(g.hersteller)}</span>` : ''}
                        ${g.cashbackBetrag ? `<span class="font-semibold text-emerald-600 dark:text-emerald-400">${fmtCurrency(g.cashbackBetrag)}</span>` : ''}
                        ${dlBadge}
                      </div>
                    </div>
                    <input type="checkbox" class="h-5 w-5 cursor-pointer mt-0.5 flex-none accent-blue-600" ${sel ? 'checked' : ''} data-action="toggleOne" data-id="${g.id}" />
                  </div>
                  <dl class="grid grid-cols-2 gap-x-3 gap-y-1.5 text-xs">
                    ${g.aktionsende ? `<div><dt class="text-slate-400 inline">Ende:</dt> <dd class="font-medium inline">${esc(g.aktionsende)}</dd></div>` : ''}
                    ${g.einsendeschluss ? `<div><dt class="text-slate-400 inline">Einsenden:</dt> <dd class="font-medium inline">${esc(g.einsendeschluss)}</dd></div>` : ''}
                    ${g.kontingent && g.kontingent !== '-' ? `<div class="col-span-2"><dt class="text-slate-400 inline">Kontingent:</dt> <dd class="font-medium inline">${esc(g.kontingent)}</dd></div>` : ''}
                    ${g.agentur ? `<div class="col-span-2"><dt class="text-slate-400 inline">Agentur:</dt> <dd class="font-medium inline">${esc(g.agentur)}</dd></div>` : ''}
                  </dl>
                  <div class="flex flex-wrap gap-2 pt-1 border-t border-slate-100 dark:border-slate-800 mt-auto">
                    ${g.aktionsseite ? `<a href="${esc(g.aktionsseite)}" target="_blank" rel="noopener" class="btn btn-secondary text-xs py-1 px-2">${I.link} Aktion</a>` : ''}
                    ${g.mydealzLink ? `<a href="${esc(g.mydealzLink)}" target="_blank" rel="noopener" class="btn btn-secondary text-xs py-1 px-2">${I.link} mydealz</a>` : ''}
                    <button class="btn btn-ghost text-xs py-1 px-2 ml-auto" data-action="previewGzg" data-id="${g.id}">Details →</button>
                  </div>
                </div>`;
              }).join('')}
            </div>`}`}
      </div>`;
  }

  // ============================================================
  // RENDER: STATISTIKEN
  // ============================================================
  function renderStatistiken() {
    const s = getStats();
    const month = getMonthStats();
    const hersteller = getHerstellerStats();
    const max = Math.max(1, ...month.map(m => m.betrag));

    return `
      <div class="space-y-6">
        <h1 class="text-2xl font-bold">Statistiken</h1>
        <div class="grid gap-4 sm:grid-cols-3">
          ${[
            { label: 'Gesamt', v: s.summen.gesamt, c: 'bg-brand-600' },
            { label: 'Bereits erhalten', v: s.summen.erhalten, c: 'bg-emerald-500' },
            { label: 'Noch ausstehend', v: s.summen.ausstehend, c: 'bg-amber-500' },
          ].map(c => `
            <div class="card p-5 flex items-center gap-4">
              <div class="h-10 w-1 rounded-full ${c.c}"></div>
              <div>
                <p class="text-xs uppercase tracking-wide text-slate-500">${c.label}</p>
                <p class="text-2xl font-bold tabular-nums">${fmtCurrency(c.v)}</p>
              </div>
            </div>`).join('')}
        </div>

        <div class="card p-5">
          <h2 class="mb-4 font-semibold">Cashback pro Monat</h2>
          ${month.length === 0
            ? '<p class="text-sm text-slate-500">Keine Daten.</p>'
            : `<div class="flex items-end gap-2 h-64 px-2">
                ${month.map(m => `
                  <div class="flex-1 flex flex-col items-center gap-1 min-w-0">
                    <div class="text-xs tabular-nums text-slate-500">${fmtCurrency(m.betrag)}</div>
                    <div class="bar w-full" style="height: ${(m.betrag / max) * 80}%"></div>
                    <div class="text-xs text-slate-500 truncate w-full text-center">${m.monat}</div>
                  </div>`).join('')}
              </div>`}
        </div>

        <div class="card p-5">
          <h2 class="mb-4 font-semibold">Hersteller</h2>
          ${hersteller.length === 0
            ? '<p class="text-sm text-slate-500">Keine Daten.</p>'
            : (() => {
                const total = hersteller.reduce((sum, h) => sum + h.betrag, 0) || 1;
                return `<div class="overflow-x-auto"><table class="min-w-full text-sm">
                  <thead><tr>
                    <th class="px-2 py-2 text-left text-xs font-semibold uppercase text-slate-500">Hersteller</th>
                    <th class="px-2 py-2 text-right text-xs font-semibold uppercase text-slate-500">Anzahl</th>
                    <th class="px-2 py-2 text-right text-xs font-semibold uppercase text-slate-500">Summe</th>
                    <th class="px-2 py-2 text-left text-xs font-semibold uppercase text-slate-500 w-1/3">Anteil</th>
                  </tr></thead>
                  <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
                    ${hersteller.map(h => `
                      <tr>
                        <td class="px-2 py-2 font-medium">${esc(h.hersteller)}</td>
                        <td class="px-2 py-2 text-right tabular-nums">${h.anzahl}</td>
                        <td class="px-2 py-2 text-right tabular-nums">${fmtCurrency(h.betrag)}</td>
                        <td class="px-2 py-2"><div class="h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden"><div class="h-full bg-brand-500" style="width: ${(h.betrag / total) * 100}%"></div></div></td>
                      </tr>`).join('')}
                  </tbody></table></div>`;
              })()}
        </div>
      </div>`;
  }

  // ============================================================
  // FORMS
  // ============================================================
  function openAktionForm(aktion) {
    const a = aktion || { status: 'OFFEN' };
    const isEdit = !!aktion;
    const body = `
      <form id="aktion-form" class="space-y-4">
        <div class="grid gap-4 sm:grid-cols-2">
          <label class="block sm:col-span-2"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Produkt *</span><input class="input" name="produktname" value="${esc(a.produktname || '')}" required /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Hersteller</span><input class="input" name="hersteller" value="${esc(a.hersteller || '')}" /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Kaufstätte</span><input class="input" name="kaufstaette" value="${esc(a.kaufstaette || '')}" placeholder="z.B. Edeka, Rossmann..." /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Cashback-Betrag (€) *</span><input type="number" step="0.01" class="input" name="cashbackBetrag" value="${a.cashbackBetrag ?? ''}" required /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Status</span><select class="input" name="status">${STATUS_LIST.map(s => `<option value="${s}" ${a.status === s ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('')}</select></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Kaufdatum</span><input type="date" class="input" name="kaufdatum" value="${toInputDate(a.kaufdatum)}" /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Teilnahmedatum</span><input type="date" class="input" name="teilnahmedatum" value="${toInputDate(a.teilnahmedatum)}" /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Einsendeschluss</span><input type="date" class="input" name="einsendeschluss" value="${toInputDate(a.einsendeschluss)}" /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Aktions-Ende</span><input type="date" class="input" name="aktionsende" value="${toInputDate(a.aktionsende)}" /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Cashback erhalten am</span><input type="date" class="input" name="cashbackErhaltenAm" value="${toInputDate(a.cashbackErhaltenAm)}" /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Belegnummer / Referenz</span><input class="input" name="belegnummer" value="${esc(a.belegnummer || '')}" /></label>
          <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Abwickelnde Agentur</span><input class="input" name="agentur" value="${esc(a.agentur || '')}" /></label>
          <label class="block sm:col-span-2"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Aktionsseite (URL)</span><input class="input" name="aktionsseite" value="${esc(a.aktionsseite || '')}" /></label>
          <label class="block sm:col-span-2"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">mydealz-Link</span><input class="input" name="mydealzLink" value="${esc(a.mydealzLink || '')}" /></label>
        </div>
        <label class="block"><span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Bemerkungen</span><textarea rows="3" class="input" name="bemerkungen">${esc(a.bemerkungen || '')}</textarea></label>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" class="btn btn-secondary" data-action="modalCancel">Abbrechen</button>
          <button type="submit" class="btn btn-primary">${isEdit ? 'Aktualisieren' : 'Anlegen'}</button>
        </div>
      </form>`;
    openModal({ title: isEdit ? `Bearbeiten: ${a.produktname}` : 'Neue Aktion', body, size: 'lg' });
    document.getElementById('aktion-form').addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const v = Object.fromEntries(fd.entries());
      if (!v.produktname.trim()) { toast('Produkt fehlt', 'error'); return; }
      saveAktion(v, aktion?.id);
    });
    document.querySelector('[data-action="modalCancel"]').addEventListener('click', closeModal);
  }

  function openDeleteConfirm(id) {
    const body = `
      <p class="text-sm text-slate-600 dark:text-slate-400">Diese Aktion wirklich löschen?</p>
      <div class="mt-6 flex justify-end gap-2">
        <button class="btn btn-secondary" data-action="modalCancel">Abbrechen</button>
        <button class="btn btn-danger" data-action="confirmDelete">Löschen</button>
      </div>`;
    openModal({ title: 'Löschen?', body, size: 'sm' });
    document.querySelector('[data-action="modalCancel"]').addEventListener('click', closeModal);
    document.querySelector('[data-action="confirmDelete"]').addEventListener('click', () => deleteAktion(id));
  }

  function openGzgPreview(id) {
    const g = state.gzg.find(x => x.id === id);
    if (!g) return;
    const sel = state.importSelection.includes(id);
    const linkBtn = (label, url, primary) => url ? `<a href="${esc(url)}" target="_blank" rel="noopener" class="btn ${primary ? 'btn-primary' : 'btn-secondary'}">${I.link} ${label}</a>` : '';
    const body = `
      <div class="space-y-4">
        <div class="flex items-start gap-3">
          ${logoForGzg(g)}
          <div class="flex-1 min-w-0">
            <h3 class="text-base font-semibold">${esc(g.produktname)}</h3>
            ${g.hersteller ? `<p class="text-sm text-slate-500">${esc(g.hersteller)}</p>` : ''}
            ${g.cashbackBetrag ? `<p class="text-base font-semibold text-emerald-600 dark:text-emerald-400 mt-1">${fmtCurrency(g.cashbackBetrag)} Cashback</p>` : ''}
          </div>
        </div>
        <dl class="grid gap-3 sm:grid-cols-2 text-sm">
          ${g.cashbackBetrag ? `<div><dt class="text-xs font-medium text-slate-500">Cashback</dt><dd class="mt-1 font-semibold text-emerald-600 dark:text-emerald-400">${fmtCurrency(g.cashbackBetrag)}</dd></div>` : ''}
          ${g.kontingent ? `<div><dt class="text-xs font-medium text-slate-500">Kontingent</dt><dd class="mt-1 font-medium">${esc(g.kontingent)}</dd></div>` : ''}
          ${g.aktionsende ? `<div><dt class="text-xs font-medium text-slate-500">Aktions-Ende</dt><dd class="mt-1 font-medium">${esc(g.aktionsende)}</dd></div>` : ''}
          ${g.einsendeschluss ? `<div><dt class="text-xs font-medium text-slate-500">Einsendeschluss</dt><dd class="mt-1 font-medium">${esc(g.einsendeschluss)}</dd></div>` : ''}
          ${g.einreichungsfrist ? `<div><dt class="text-xs font-medium text-slate-500">Einreichungsfrist</dt><dd class="mt-1 font-medium">${esc(g.einreichungsfrist)}</dd></div>` : ''}
          ${g.teilnahme ? `<div><dt class="text-xs font-medium text-slate-500">Art der Teilnahme</dt><dd class="mt-1 font-medium">${esc(g.teilnahme)}</dd></div>` : ''}
          ${g.kaufbeleg ? `<div><dt class="text-xs font-medium text-slate-500">Art des Kaufbeleges</dt><dd class="mt-1 font-medium">${esc(g.kaufbeleg)}</dd></div>` : ''}
          ${g.agentur ? `<div><dt class="text-xs font-medium text-slate-500">Agentur</dt><dd class="mt-1 font-medium">${esc(g.agentur)}</dd></div>` : ''}
          <div><dt class="text-xs font-medium text-slate-500">SMS-Bestätigung</dt><dd class="mt-1 font-medium">${g.sms ? 'Ja' : 'Nein'}</dd></div>
        </dl>
        <div class="flex flex-wrap gap-2 pt-2 border-t border-slate-200 dark:border-slate-800">
          ${linkBtn('Zur Aktionsseite', g.aktionsseite, true)}
          ${linkBtn('mydealz-Post', g.mydealzLink)}
        </div>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        ${!sel ? `<button class="btn btn-secondary" data-action="selectFromPreview" data-id="${id}">${I.check} Auswählen</button>` : ''}
        <button class="btn btn-ghost" data-action="modalCancel">Schließen</button>
      </div>`;
    openModal({ title: 'GZG-Aktion', body, size: 'md' });
    document.querySelector('[data-action="modalCancel"]').addEventListener('click', closeModal);
    const selBtn = document.querySelector('[data-action="selectFromPreview"]');
    if (selBtn) selBtn.addEventListener('click', () => { setState({ importSelection: [...state.importSelection, id] }); closeModal(); });
  }

  function openSettings() {
    const body = `
      <div class="space-y-4 text-sm">
        <div class="card p-4 space-y-3">
          <h3 class="font-semibold">Google Sheets-Quelle</h3>
          <input class="input" id="set-sheet-url" value="${esc(state.sheetUrl)}" placeholder="https://docs.google.com/spreadsheets/d/..." />
          <p class="text-xs text-slate-500">Die Tabelle muss "öffentlich für alle mit dem Link" freigegeben sein.</p>
          <div class="flex flex-wrap gap-2">
            <button class="btn btn-secondary" id="save-sheet-url">Speichern</button>
            <button class="btn btn-primary" id="sync-now">${I.refresh} Jetzt synchronisieren</button>
          </div>
        </div>
        <div class="card p-4">
          <h3 class="font-semibold mb-2">Daten</h3>
          <p class="text-slate-500 mb-3">${state.aktionen.length} Aktionen, ${state.gzg.length} GZG-Einträge.</p>
          <div class="flex flex-wrap gap-2">
            <button class="btn btn-secondary" id="export-json">${I.download} Backup als JSON</button>
            <label class="btn btn-secondary cursor-pointer">${I.upload} JSON laden<input type="file" accept=".json" class="hidden" id="import-json" /></label>
          </div>
        </div>
        <div class="card p-4">
          <h3 class="font-semibold mb-2 text-red-600">Zurücksetzen</h3>
          <p class="text-slate-500 mb-3">Löscht alle Aktionen und GZG-Daten.</p>
          <button class="btn btn-danger" id="reset-all">Alles zurücksetzen</button>
        </div>
      </div>`;
    openModal({ title: 'Einstellungen', body, size: 'md' });

    document.getElementById('save-sheet-url').onclick = () => {
      const v = document.getElementById('set-sheet-url').value.trim();
      setState({ sheetUrl: v });
      toast('Sheet-URL gespeichert.', 'success');
    };
    document.getElementById('sync-now').onclick = () => {
      const v = document.getElementById('set-sheet-url').value.trim();
      if (v !== state.sheetUrl) setState({ sheetUrl: v });
      closeModal();
      syncFromGoogleSheets();
    };
    document.getElementById('export-json').onclick = () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `gzg-backup-${new Date().toISOString().substring(0, 10)}.json`;
      a.click(); URL.revokeObjectURL(url);
      toast('Backup erstellt.', 'success');
    };
    document.getElementById('import-json').onchange = e => {
      const f = e.target.files?.[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => {
        try {
          const d = JSON.parse(ev.target.result);
          if (!Array.isArray(d.aktionen) || !Array.isArray(d.gzg)) throw new Error('Ungültiges Format');
          state = { ...state, ...d }; persist(); render(); closeModal();
          toast('Daten geladen.', 'success');
        } catch (err) { toast('Fehler: ' + err.message, 'error'); }
      };
      r.readAsText(f);
    };
    document.getElementById('reset-all').onclick = () => {
      if (!confirm('Wirklich alle Daten löschen?')) return;
      Store.reset();
      state = { ...initialState, theme: state.theme };
      persist(); render(); closeModal();
      toast('Daten zurückgesetzt.', 'success');
    };
  }

  // ============================================================
  // EVENTS
  // ============================================================
  function bindEvents() {
    const app = document.getElementById('app');

    app.onclick = (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      const a = t.dataset.action;

      if (a === 'navigate') setState({ route: t.dataset.route });
      else if (a === 'toggleTheme') setState({ theme: state.theme === 'dark' ? 'light' : 'dark' });
      else if (a === 'settings') openSettings();
      else if (a === 'sync') syncFromGoogleSheets();
      else if (a === 'newAktion') openAktionForm(null);
      else if (a === 'editAktion') openAktionForm(state.aktionen.find(x => x.id === Number(t.dataset.id)));
      else if (a === 'deleteAktion') openDeleteConfirm(Number(t.dataset.id));
      else if (a === 'exportCSV') exportCSV();
      else if (a === 'toggleFilter') setState({ showFilter: !state.showFilter });
      else if (a === 'clearSearch') setState({ filter: { ...state.filter, search: '', page: 1 } });
      else if (a === 'sort') {
        const c = t.dataset.col;
        const dir = state.filter.sortBy === c && state.filter.sortDir === 'asc' ? 'desc' : 'asc';
        setState({ filter: { ...state.filter, sortBy: c, sortDir: dir } });
      }
      else if (a === 'page') setState({ filter: { ...state.filter, page: Math.max(1, state.filter.page + Number(t.dataset.dir)) } });
      else if (a === 'resetFilter') setState({ filter: { ...state.filter, status: '', hersteller: '', kaufstaette: '', von: '', bis: '', page: 1 } });
      else if (a === 'toggleAll') {
        const items = state.gzg.filter(g => !g.importiert).filter(g => {
          if (!state.importSearch) return true;
          const s = state.importSearch.toLowerCase();
          return g.produktname.toLowerCase().includes(s) || (g.hersteller || '').toLowerCase().includes(s) || (g.agentur || '').toLowerCase().includes(s);
        });
        const ids = items.map(i => i.id);
        const all = ids.every(id => state.importSelection.includes(id));
        setState({ importSelection: all ? [] : ids });
      }
      else if (a === 'toggleOne') {
        const id = Number(t.dataset.id);
        setState({ importSelection: state.importSelection.includes(id) ? state.importSelection.filter(x => x !== id) : [...state.importSelection, id] });
      }
      else if (a === 'doImport') importGZG(state.importSelection);
      else if (a === 'previewGzg') openGzgPreview(Number(t.dataset.id));
      else if (a === 'clearImportSearch') setState({ importSearch: '' });
    };

    app.oninput = (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      if (t.dataset.action === 'search-input') {
        clearTimeout(window._st);
        window._st = setTimeout(() => setState({ filter: { ...state.filter, search: t.value, page: 1 } }), 250);
      } else if (t.dataset.action === 'importSearch') {
        clearTimeout(window._it);
        window._it = setTimeout(() => setState({ importSearch: t.value }), 250);
      }
    };

    app.onchange = (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      if (t.dataset.action === 'filter') setState({ filter: { ...state.filter, [t.dataset.key]: t.value, page: 1 } });
      else if (t.dataset.action === 'csvUpload') {
        const f = t.files?.[0];
        if (f) importCsvFile(f);
        t.value = '';
      }
    };
  }

  // ============================================================
  // RENDER MAIN
  // ============================================================
  function render() {
    applyTheme();
    let content;
    switch (state.route) {
      case 'aktionen': content = renderAktionen(); break;
      case 'import': content = renderImport(); break;
      case 'statistiken': content = renderStatistiken(); break;
      default: content = renderDashboard();
    }
    document.getElementById('app').innerHTML = renderShell(content);

    if (state.route === 'aktionen') {
      const inp = document.querySelector('[data-action="search-input"]');
      if (inp && document.activeElement !== inp && inp.value) {
        const v = inp.value; inp.focus(); inp.setSelectionRange(v.length, v.length);
      }
    }
  }

  // ============================================================
  // INIT
  // ============================================================
  bindEvents();
  render();

  // Beim allerersten Aufruf gleich synchronisieren
  if (!state.lastSync && state.gzg.length === 0 && state.sheetUrl) {
    syncFromGoogleSheets();
  }
  </script>
</body>
</html>
