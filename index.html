    settings: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    link: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
    check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    package: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>',
  };

  // ============================================================
  // STORAGE
  // ============================================================
  const Store = {
    load() { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; } },
    save(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); },
    reset() { localStorage.removeItem(STORAGE_KEY); },
  };

  // ============================================================
  // STATE
  // ============================================================
  const initialState = {
    route: 'dashboard',
    theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
    sheetUrls: [DEFAULT_SHEET_URL],
    lastSync: null,
    gzg: [],
    aktionen: [],
    nextId: { gzg: 1, aktion: 1 },
    filter: { search: '', status: '', von: '', bis: '', sortBy: 'createdAt', sortDir: 'desc', page: 1, pageSize: 25 },
    importSelection: [],
    importSearch: '',
    importSort: 'einsendeschluss-asc',
    showHiddenGzg: false,
    showFilter: false,
    lastSeenGzg: null,
  };

  let state = (() => {
    const s = Store.load();
    if (!s) return initialState;
    // Migrate legacy `sheetUrl` (string) -> `sheetUrls` (array)
    if (s.sheetUrl && !s.sheetUrls) {
      s.sheetUrls = [s.sheetUrl];
      delete s.sheetUrl;
    }
    return { ...initialState, ...s };
  })();

  function persist() { Store.save(state); }
  function setState(patch) {
    // Beim Verlassen der GZG-Liste: NEU-Markierung "abhaken"
    if (patch.route && patch.route !== state.route && state.route === 'import') {
      patch = { ...patch, lastSeenGzg: new Date().toISOString() };
    }
    state = { ...state, ...patch };
    persist();
    render();
  }
  function isNewGzg(g) {
    if (!g || g.importiert || !g.addedAt) return false;
    if (!state.lastSeenGzg) return true;
    return g.addedAt > state.lastSeenGzg;
  }

  // ============================================================
  // UTILS
  // ============================================================
  function fmtCurrency(v) {
    if (v == null || isNaN(v)) return '–';
    return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(v);
  }
  function fmtDate(s) {
    if (!s) return '–';
    const d = parseDate(s);
    if (!d) return s;
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }
  // Local YYYY-MM-DD (NOT toISOString — das verschiebt CET-Mitternacht in UTC einen Tag zurück)
  function toInputDate(s) {
    if (!s) return '';
    const d = parseDate(s);
    if (!d) return '';
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }
  // Parse DD.MM.YYYY or YYYY-MM-DD
  function parseDate(s) {
    if (!s) return null;
    if (s instanceof Date) return s;
    const str = String(s).trim();
    if (!str) return null;
    let m = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
    if (m) {
      const day = parseInt(m[1], 10), month = parseInt(m[2], 10) - 1;
      let year = parseInt(m[3], 10);
      if (year < 100) year += 2000;
      const d = new Date(year, month, day);
      return isNaN(d.getTime()) ? null : d;
    }
    m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) {
      const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
      return isNaN(d.getTime()) ? null : d;
    }
    const d = new Date(str);
    return isNaN(d.getTime()) ? null : d;
  }
  function daysUntil(s) {
    const d = parseDate(s);
    if (!d) return null;
    return Math.ceil((d.getTime() - Date.now()) / 86400000);
  }
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }

  // Versucht Cashback-Betrag aus Beschreibung zu extrahieren
  function extractCashbackBetrag(text) {
    if (!text) return null;
    const m = String(text).match(/(\d+[,.]\d{2}|\d+)\s*€/);
    if (m) return parseFloat(m[1].replace(',', '.'));
    return null;
  }

  // ============================================================
  // TOAST & MODAL
  // ============================================================
  function toast(msg, type = 'info') {
    const colors = {
      success: 'bg-emerald-50 text-emerald-900 border-emerald-200 dark:bg-emerald-950 dark:text-emerald-200 dark:border-emerald-900',
      error: 'bg-red-50 text-red-900 border-red-200 dark:bg-red-950 dark:text-red-200 dark:border-red-900',
      info: 'bg-white text-slate-900 border-slate-200 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-700',
    };
    const div = document.createElement('div');
    div.className = `toast flex items-start gap-3 rounded-lg border px-4 py-3 shadow-lg ${colors[type]}`;
    div.innerHTML = `<p class="flex-1 text-sm">${esc(msg)}</p>`;
    document.getElementById('toasts').appendChild(div);
    setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity .2s'; setTimeout(() => div.remove(), 200); }, 4000);
  }

  function openModal({ title, body, size = 'md' }) {
    const sz = { sm: 'max-w-md', md: 'max-w-xl', lg: 'max-w-3xl', xl: 'max-w-5xl' }[size];
    const root = document.getElementById('modals');
    root.innerHTML = `
      <div class="modal-enter fixed inset-0 z-40 flex items-end sm:items-center justify-center bg-black/50 sm:p-4 backdrop-blur-sm" data-modal-backdrop>
        <div class="card w-full ${sz} max-h-[92vh] flex flex-col overflow-hidden rounded-t-xl sm:rounded-xl">
          <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-4 sm:px-5 py-3">
            <h2 class="text-base sm:text-lg font-semibold truncate pr-2">${esc(title)}</h2>
            <button class="btn btn-ghost p-2 flex-none" data-modal-close aria-label="Schließen">${I.x}</button>
          </div>
          <div class="flex-1 overflow-y-auto p-4 sm:p-5">${body}</div>
        </div>
      </div>`;
    root.querySelector('[data-modal-backdrop]').addEventListener('click', e => { if (e.target.matches('[data-modal-backdrop]')) closeModal(); });
    root.querySelector('[data-modal-close]').addEventListener('click', closeModal);
  }
  function closeModal() { document.getElementById('modals').innerHTML = ''; }

  function applyTheme() { document.documentElement.classList.toggle('dark', state.theme === 'dark'); }

  // ============================================================
  // GOOGLE SHEETS SYNC
  // ============================================================
  // Extracts spreadsheet ID + gid from a Google Sheets URL.
  function parseSheetUrl(url) {
    const m = String(url).match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if (!m) return null;
    const id = m[1];
    const gMatch = String(url).match(/[?&#]gid=(\d+)/);
    const gid = gMatch ? gMatch[1] : '0';
    return { id, gid };
  }

  // gviz JSON endpoint — reliable for sheets with multi-line cells, returns
  // structured rows/cols and respects CORS for public sheets.
  function buildGSheetJsonUrl(url) {
    const p = parseSheetUrl(url);
    return p ? `https://docs.google.com/spreadsheets/d/${p.id}/gviz/tq?tqx=out:json&gid=${p.gid}` : null;
  }

  // Try direct fetch, then via public CORS proxy as fallback.
  async function fetchTextWithFallback(targetUrl) {
    try {
      const res = await fetch(targetUrl);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.text();
    } catch (e) {
      const proxied = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
      const res = await fetch(proxied);
      if (!res.ok) throw new Error('Proxy HTTP ' + res.status);
      return await res.text();
    }
  }

  // The gviz JSON endpoint returns JSONP wrapped in a function call:
  //   /*O_o*/google.visualization.Query.setResponse({...});
  // We strip the wrapper to get the JSON payload.
  function parseGvizJsonp(text) {
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('Unerwartetes Antwortformat');
    return JSON.parse(text.substring(start, end + 1));
  }

  async function syncOneSheet(sheetUrl) {
    const jsonUrl = buildGSheetJsonUrl(sheetUrl);
    if (!jsonUrl) throw new Error('Ungültige URL: ' + sheetUrl);
    const text = await fetchTextWithFallback(jsonUrl);
    const data = parseGvizJsonp(text);
    return parseGZGJson(data);
  }

  async function syncFromGoogleSheets() {
    const urls = (state.sheetUrls || []).filter(u => u && u.trim());
    if (urls.length === 0) { toast('Keine Sheet-URL hinterlegt. Bitte in den Einstellungen setzen.', 'error'); return; }
    toast(urls.length === 1 ? 'Synchronisiere…' : `Synchronisiere ${urls.length} Tabs…`, 'info');
    try {
      const results = [];
      for (const url of urls) results.push(await syncOneSheet(url));
      const all = results.flat();
      if (all.length === 0) throw new Error('Keine Datenzeilen gefunden');
      const stats = mergeGZG(all);
      setState({ lastSync: new Date().toISOString() });
      const breakdown = `${stats.added} neu, ${stats.updated} aktualisiert`;
      toast(`${all.length} GZG-Aktionen synchronisiert (${breakdown}).`, stats.added > 0 ? 'success' : 'info');
    } catch (e) {
      console.error(e);
      toast('Sync fehlgeschlagen: ' + e.message + '. Tipp: CSV manuell laden über "GZG-Liste → CSV laden".', 'error');
    }
  }

  // Imports a manually downloaded CSV file (same format as the Google Sheet)
  function importCsvFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = parseGZGCsv(String(e.target.result));
        if (parsed.length === 0) throw new Error('Keine Datenzeilen erkannt');
        const stats = mergeGZG(parsed);
        setState({ lastSync: new Date().toISOString() });
        toast(`${parsed.length} GZG-Aktionen aus CSV geladen (${stats.added} neu, ${stats.updated} aktualisiert).`, stats.added > 0 ? 'success' : 'info');
      } catch (err) {
        toast('CSV-Import fehlgeschlagen: ' + err.message, 'error');
      }
    };
    reader.readAsText(file, 'utf-8');
  }

  // Robust CSV parser that supports quoted cells with embedded newlines —
  // the previous line-based parser broke on the GZG sheet where some cells
  // contain multi-line product descriptions.
  function parseCsv(text) {
    if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);
    const semi = (text.match(/;/g) || []).length;
    const comma = (text.match(/,/g) || []).length;
    const sep = semi > comma ? ';' : ',';

    const rows = [];
    let row = [];
    let cell = '';
    let inQuote = false;

    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuote) {
        if (c === '"' && text[i + 1] === '"') { cell += '"'; i++; }
        else if (c === '"') inQuote = false;
        else cell += c;
      } else {
        if (c === '"') inQuote = true;
        else if (c === sep) { row.push(cell); cell = ''; }
        else if (c === '\r') { /* skip */ }
        else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
        else cell += c;
      }
    }
    if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
    return rows;
  }

  // Parses a CSV from the GZG Google Sheet into normalized objects.
  //
  // The mydealz-GZG sheet has a fixed column layout (verified against the
  // source). We use FIXED positions because the heuristic header search was
  // unreliable (e.g. "Zeitpunkt" in column D was being picked up as
  // Aktions-ende, which is column E). Heuristics only kick in if the sheet
  // structure changes in the future.
  //
  // Columns:
  // A=0 Produktbild, B=1 Aktionsbeschreibung, C=2 Kontingent,
  // D=3 Zeitpunkt, E=4 Aktions-ende, F=5 Einsendeschluss,
  // G=6 Einreichungs-frist, H=7 Art der Teilnahme, I=8 Begründung,
  // J=9 Art des Kaufbeleges, K=10 SMS Bestätigung, L=11 Aktionsseite,
  // M=12 mydealz Link, N=13 abwickelnde Agentur
  const GZG_COLS = {
    produkt: 1,
    kontingent: 2,
    aktionsende: 4,
    einsendeschluss: 5,
    einreichungsfrist: 6,
    teilnahme: 7,
    kaufbeleg: 9,
    sms: 10,
    aktionsseite: 11,
    mydealz: 12,
    agentur: 13,
  };

  // Build a normalized GZG entry from raw column values.
  // Used by both the JSON and CSV parsers.
  function buildGzgEntry(values) {
    const produkt = (values.produkt || '').trim();
    if (!produkt) return null;

    const aktionsseite = (values.aktionsseite || '').trim();
    const einsendeschluss = (values.einsendeschluss || '').trim();
    const aktionsende = (values.aktionsende || '').trim();

    // Filter: must have a product name and either a date or an action page.
    // Rows missing all of these are footer/notes/disclaimers.
    if (!einsendeschluss && !aktionsende && !aktionsseite) return null;

    return {
      produktname: produkt,
      kontingent: (values.kontingent || '').trim() || null,
      aktionsende: aktionsende || null,
      einsendeschluss: einsendeschluss || null,
      einreichungsfrist: (values.einreichungsfrist || '').trim() || null,
      teilnahme: (values.teilnahme || '').trim() || null,
      kaufbeleg: (values.kaufbeleg || '').trim() || null,
      sms: /ja|yes/i.test((values.sms || '').trim()),
      aktionsseite,
      mydealzLink: (values.mydealz || '').trim() || null,
      agentur: (values.agentur || '').trim() || null,
      hersteller: extractHersteller(produkt),
      cashbackBetrag: extractCashbackBetrag(produkt),
    };
  }

  // Picks a useful string from a gviz cell. Prefer the formatted value `f`
  // for dates (DD.MM.YYYY) and fall back to the raw value `v`.
  function gvizCell(cell) {
    if (!cell) return '';
    if (cell.f != null && cell.f !== '') return String(cell.f).trim();
    if (cell.v != null) return String(cell.v).trim();
    return '';
  }

  function parseGZGJson(json) {
    if (!json || !json.table || !Array.isArray(json.table.rows)) {
      throw new Error('Ungültige Tabellen-Antwort');
    }
    const c = GZG_COLS;
    const out = [];
    let skipped = 0;
    for (const row of json.table.rows) {
      const cells = row.c || [];
      const entry = buildGzgEntry({
        produkt: gvizCell(cells[c.produkt]),
        kontingent: gvizCell(cells[c.kontingent]),
        aktionsende: gvizCell(cells[c.aktionsende]),
        einsendeschluss: gvizCell(cells[c.einsendeschluss]),
        einreichungsfrist: gvizCell(cells[c.einreichungsfrist]),
        teilnahme: gvizCell(cells[c.teilnahme]),
        kaufbeleg: gvizCell(cells[c.kaufbeleg]),
        sms: gvizCell(cells[c.sms]),
        aktionsseite: gvizCell(cells[c.aktionsseite]),
        mydealz: gvizCell(cells[c.mydealz]),
        agentur: gvizCell(cells[c.agentur]),
      });
      if (entry) out.push(entry); else skipped++;
    }
    if (skipped > 0) console.info(`GZG-Parser (JSON): ${skipped} Zeilen übersprungen.`);
    return out;
  }

  function parseGZGCsv(text) {
    const rows = parseCsv(text);
    if (rows.length < 2) return [];
    const c = GZG_COLS;
    const out = [];
    let skipped = 0;
    for (let i = 1; i < rows.length; i++) {
      const cells = rows[i];
      const entry = buildGzgEntry({
        produkt: cells[c.produkt],
        kontingent: cells[c.kontingent],
        aktionsende: cells[c.aktionsende],
        einsendeschluss: cells[c.einsendeschluss],
        einreichungsfrist: cells[c.einreichungsfrist],
        teilnahme: cells[c.teilnahme],
        kaufbeleg: cells[c.kaufbeleg],
        sms: cells[c.sms],
        aktionsseite: cells[c.aktionsseite],
        mydealz: cells[c.mydealz],
        agentur: cells[c.agentur],
      });
      if (entry) out.push(entry); else skipped++;
    }
    if (skipped > 0) console.info(`GZG-Parser (CSV): ${skipped} Zeilen übersprungen.`);
    return out;
  }

  // Heuristic: many GZG entries start with the brand in CAPS.
  function extractHersteller(produkt) {
    const m = String(produkt).match(/^([A-ZÄÖÜ][A-ZÄÖÜ0-9&'.\- ]{1,25})\s+\S/);
    return m ? m[1].trim() : null;
  }

  // Extracts a domain (without www.) from a URL string.
  function extractDomain(url) {
    if (!url) return null;
    try {
      const clean = String(url).trim();
      const u = new URL(clean.startsWith('http') ? clean : 'https://' + clean);
      return u.hostname.replace(/^www\./, '');
    } catch { return null; }
  }

  // Google favicon service — works without CORS, returns a tiny brand icon.
  function faviconUrl(domain, size = 64) {
    if (!domain) return '';
    return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=${size}`;
  }

  // Color avatar for items without a usable URL (deterministic by name)
  function initialAvatar(name) {
    const ch = (name && name[0] ? name[0] : '?').toUpperCase();
    let h = 0;
    for (let i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) % 360;
    return `<div class="w-14 h-14 rounded-xl flex items-center justify-center text-white font-bold text-xl flex-none shadow-sm" style="background: linear-gradient(135deg, hsl(${h},70%,55%), hsl(${(h+40)%360},70%,40%));">${esc(ch)}</div>`;
  }

  function logoForGzg(g) {
    const dom = extractDomain(g.aktionsseite);
    if (dom) {
      return `<div class="w-14 h-14 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center flex-none shadow-sm overflow-hidden">
        <img src="${faviconUrl(dom, 64)}" alt="" class="w-9 h-9" loading="lazy" onerror="this.parentElement.outerHTML=this.parentElement.dataset.fallback" data-fallback='${initialAvatar(g.hersteller || g.produktname).replace(/'/g, "&apos;")}' />
      </div>`;
    }
    return initialAvatar(g.hersteller || g.produktname);
  }

  // Merge fresh entries into state.gzg by produktname.
  // Preserves entries that have already been imported to a CashbackAktion
  // (so the user doesn't lose tracking even if the source sheet changes).
  // Drops stale non-imported entries that are no longer in the source.
  function mergeGZG(fresh) {
    const freshNames = new Set(fresh.map(f => f.produktname));
    // 1. Keep imported entries even if they vanished from the source
    // 2. Drop non-imported entries that are no longer in the source
    let kept = state.gzg.filter(g => g.importiert || freshNames.has(g.produktname));
    let nextId = state.nextId.gzg;
    let added = 0, updated = 0;
    const now = new Date().toISOString();
    for (const f of fresh) {
      const existing = kept.find(g => g.produktname === f.produktname);
      if (existing) {
        // Update existing fields but preserve id, importiert, hidden, cellColor and addedAt
        Object.assign(existing, f, {
          id: existing.id,
          importiert: existing.importiert,
          hidden: existing.hidden,
          cellColor: existing.cellColor || null,
          addedAt: existing.addedAt,
        });
        updated++;
      } else {
        kept.push({ id: nextId++, ...f, importiert: false, hidden: false, cellColor: null, addedAt: now });
        added++;
      }
    }
    setState({ gzg: kept, nextId: { ...state.nextId, gzg: nextId } });
    return { added, updated };
  }

  // ============================================================
  // CASHBACK / IMPORT
  // ============================================================
  function isDuplicate(g) {
    return state.aktionen.some(a => a.gzgId === g.id || a.produktname === g.produktname);
  }

  function importGZG(ids) {
    let imported = 0, skipped = 0;
    const newGzg = state.gzg.map(g => ({ ...g }));
    const newAktionen = [...state.aktionen];
    let next = state.nextId.aktion;

    for (const id of ids) {
      const g = newGzg.find(x => x.id === id);
      if (!g || g.importiert) { skipped++; continue; }
      if (isDuplicate(g)) { g.importiert = true; skipped++; continue; }

      newAktionen.push({
        id: next++,
        produktname: g.produktname,
        cashbackBetrag: g.cashbackBetrag ?? 0,
        kaufdatum: null,
        cashbackErhaltenAm: null,
        einsendeschluss: g.einsendeschluss || null,
        aktionsende: g.aktionsende || null,
        aktionsseite: g.aktionsseite || null,
        mydealzLink: g.mydealzLink || null,
        teilnahme: g.teilnahme || null,
        kaufbeleg: g.kaufbeleg || null,
        status: 'OFFEN',
        bemerkungen: null,
        cellColor: g.cellColor || null,
        gzgId: g.id,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      });
      g.importiert = true;
      imported++;
    }
    setState({ gzg: newGzg, aktionen: newAktionen, nextId: { ...state.nextId, aktion: next }, importSelection: [] });
    if (imported > 0) toast(`${imported} Aktion${imported === 1 ? '' : 'en'} importiert.`, 'success');
    if (skipped > 0) toast(`${skipped} übersprungen (Duplikate).`, 'info');
  }

  function saveAktion(values, id) {
    const data = {
      produktname: values.produktname.trim(),
      cashbackBetrag: parseFloat(String(values.cashbackBetrag).replace(',', '.')) || 0,
      kaufdatum: values.kaufdatum || null,
      cashbackErhaltenAm: values.cashbackErhaltenAm || null,
      einsendeschluss: values.einsendeschluss || null,
      aktionsende: values.aktionsende || null,
      aktionsseite: values.aktionsseite.trim() || null,
      mydealzLink: values.mydealzLink.trim() || null,
      status: values.status,
      bemerkungen: values.bemerkungen.trim() || null,
    };
    if (id != null) {
      setState({ aktionen: state.aktionen.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a) });
      toast('Aktion aktualisiert.', 'success');
    } else {
      const a = { id: state.nextId.aktion, gzgId: null, teilnahme: null, kaufbeleg: null, ...data, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
      setState({ aktionen: [...state.aktionen, a], nextId: { ...state.nextId, aktion: state.nextId.aktion + 1 } });
      toast('Aktion angelegt.', 'success');
    }
    closeModal();
  }

  function deleteAktion(id) {
    const a = state.aktionen.find(x => x.id === id);
    if (!a) return;
    let newGzg = state.gzg;
    if (a.gzgId) newGzg = state.gzg.map(g => g.id === a.gzgId ? { ...g, importiert: false } : g);
    setState({ aktionen: state.aktionen.filter(x => x.id !== id), gzg: newGzg });
    closeModal();
    toast('Aktion gelöscht.', 'success');
  }

  // ============================================================
  // FILTER / STATS
  // ============================================================
  function getFiltered() {
    let items = [...state.aktionen];
    const f = state.filter;
    if (f.search) {
      const s = f.search.toLowerCase();
      items = items.filter(a =>
        a.produktname.toLowerCase().includes(s) ||
        (a.bemerkungen || '').toLowerCase().includes(s)
      );
    }
    if (f.status) items = items.filter(a => a.status === f.status);
    if (f.von) items = items.filter(a => a.kaufdatum && a.kaufdatum >= f.von);
    if (f.bis) items = items.filter(a => a.kaufdatum && a.kaufdatum <= f.bis);
    items.sort((a, b) => {
      const av = a[f.sortBy], bv = b[f.sortBy];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      const cmp = av < bv ? -1 : av > bv ? 1 : 0;
      return f.sortDir === 'asc' ? cmp : -cmp;
    });
    return items;
  }
  function r2(n) { return Math.round(n * 100) / 100; }
  function getStats() {
    const items = state.aktionen;
    const sumBy = (s) => items.filter(i => i.status === s).reduce((sum, i) => sum + (i.cashbackBetrag || 0), 0);
    const cnt = (s) => items.filter(i => i.status === s).length;
    return {
      anzahl: { gesamt: items.length, offen: cnt('OFFEN'), eingereicht: cnt('EINGEREICHT'), erhalten: cnt('ERHALTEN'), abgelehnt: cnt('ABGELEHNT') },
      summen: { gesamt: r2(items.reduce((s, i) => s + (i.cashbackBetrag || 0), 0)), offen: r2(sumBy('OFFEN')), eingereicht: r2(sumBy('EINGEREICHT')), erhalten: r2(sumBy('ERHALTEN')), ausstehend: r2(sumBy('OFFEN') + sumBy('EINGEREICHT')) },
    };
  }
  function getReminders() {
    return state.aktionen.filter(a => a.status === 'OFFEN' || a.status === 'EINGEREICHT')
      .map(a => ({ ...a, daysLeft: daysUntil(a.einsendeschluss) }))
      .filter(a => a.daysLeft != null && a.daysLeft <= 14)
      .sort((a, b) => a.daysLeft - b.daysLeft);
  }
  function getMonthStats() {
    const map = new Map();
    for (const a of state.aktionen) {
      const ref = a.cashbackErhaltenAm || a.kaufdatum || a.createdAt;
      const key = (ref || '').substring(0, 7);
      if (!key) continue;
      map.set(key, (map.get(key) || 0) + (a.cashbackBetrag || 0));
    }
    return Array.from(map.entries()).sort().map(([m, b]) => ({ monat: m, betrag: r2(b) }));
  }
  function getHerstellerStats() {
    const map = new Map();
    for (const a of state.aktionen) {
      const k = a.hersteller || 'Unbekannt';
      const cur = map.get(k) || { betrag: 0, anzahl: 0 };
      cur.betrag += a.cashbackBetrag || 0; cur.anzahl++;
      map.set(k, cur);
    }
    return Array.from(map.entries()).map(([h, v]) => ({ hersteller: h, betrag: r2(v.betrag), anzahl: v.anzahl })).sort((a, b) => b.betrag - a.betrag);
  }
  function sortGzg(items, sortKey) {
    const [field, dir] = (sortKey || 'einsendeschluss-asc').split('-');
    const factor = dir === 'desc' ? -1 : 1;
    const arr = [...items];
    arr.sort((a, b) => {
      let av, bv;
      if (field === 'einsendeschluss' || field === 'aktionsende') {
        av = parseDate(a[field]); bv = parseDate(b[field]);
        if (!av && !bv) return 0;
        if (!av) return 1;
        if (!bv) return -1;
        return (av - bv) * factor;
      }
      if (field === 'cashback') {
        av = a.cashbackBetrag; bv = b.cashbackBetrag;
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        return (av - bv) * factor;
      }
      // string fields
      av = (a[field] || '').toString().toLowerCase();
      bv = (b[field] || '').toString().toLowerCase();
      if (!av && !bv) return 0;
      if (!av) return 1;
      if (!bv) return -1;
      return av.localeCompare(bv, 'de') * factor;
    });
    return arr;
  }

  function uniqueValues(field) {
    const set = new Set();
    state.aktionen.forEach(a => { if (a[field]) set.add(a[field]); });
    state.gzg.forEach(g => { if (g[field]) set.add(g[field]); });
    return Array.from(set).sort();
  }

  // ============================================================
  // CSV Export
  // ============================================================
  function exportCSV() {
    const rows = [
      ['ID', 'Produkt', 'Kaufdatum', 'Cashback', 'Cashback erhalten am', 'Einsendeschluss', 'Aktionsende', 'Aktionsseite', 'mydealz', 'Status', 'Bemerkungen'],
      ...state.aktionen.map(i => [i.id, i.produktname, i.kaufdatum || '', i.cashbackBetrag, i.cashbackErhaltenAm || '', i.einsendeschluss || '', i.aktionsende || '', i.aktionsseite || '', i.mydealzLink || '', i.status, i.bemerkungen || '']),
    ];
    const csv = '﻿' + rows.map(r => r.map(c => {
      const s = String(c);
      return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(';')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `gzg-aktionen-${new Date().toISOString().substring(0, 10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  // ============================================================
  // SHELL / NAV
  // ============================================================
  const NAV = [
    { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
    { id: 'aktionen', label: 'Aktionen', icon: 'table' },
    { id: 'import', label: 'GZG-Liste', icon: 'download' },
    { id: 'statistiken', label: 'Statistiken', icon: 'chart' },
  ];

  function renderShell(content) {
    const remCount = getReminders().length;
    const newGzgCount = state.gzg.filter(g => isNewGzg(g)).length;
    const navBadge = (n) => {
      if (n.id === 'dashboard' && remCount > 0) return `<span class="ml-1 inline-flex items-center justify-center bg-red-500 text-white rounded-full text-xs px-1.5 min-w-[1.25rem]">${remCount}</span>`;
      if (n.id === 'import' && newGzgCount > 0) return `<span class="ml-1 inline-flex items-center justify-center bg-emerald-500 text-white rounded-full text-xs px-1.5 min-w-[1.25rem]">${newGzgCount}</span>`;
      return '';
    };
    return `
      <div class="min-h-screen flex flex-col">
        <header class="sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur">
          <div class="mx-auto max-w-7xl px-4 sm:px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-brand-600">${I.wallet}</span>
              <span class="text-lg font-semibold">GZG-Verwaltung</span>
              <span class="text-xs text-slate-400 dark:text-slate-500 font-medium">${APP_VERSION}</span>
            </div>
            <div class="flex items-center gap-1">
              <button class="btn btn-ghost p-2" data-action="sync" title="Aus Google Sheets synchronisieren">${I.refresh}</button>
              <button class="btn btn-ghost p-2" data-action="settings" title="Einstellungen">${I.settings}</button>
              <button class="btn btn-ghost p-2" data-action="toggleTheme" title="Theme">${state.theme === 'dark' ? I.sun : I.moon}</button>
            </div>
          </div>
          <nav class="mx-auto max-w-7xl px-2 sm:px-6 pb-2 flex gap-1 overflow-x-auto">
            ${NAV.map(n => `<button class="nav-link ${state.route === n.id ? 'active' : ''}" data-action="navigate" data-route="${n.id}">${I[n.icon]}${n.label}${navBadge(n)}</button>`).join('')}
          </nav>
        </header>
        <main class="mx-auto max-w-7xl w-full flex-1 px-4 sm:px-6 py-6">${content}</main>
        <footer class="border-t border-slate-200 dark:border-slate-800 py-3 text-center text-xs text-slate-500">
          ${state.lastSync ? `Letzte Synchronisation: ${new Date(state.lastSync).toLocaleString('de-DE')}` : 'Noch nicht synchronisiert.'}
          · Daten lokal im Browser · GZG-Verwaltung ${APP_VERSION}
        </footer>
      </div>`;
  }

  // ============================================================
  // RENDER: DASHBOARD
  // ============================================================
  function renderDashboard() {
    const s = getStats();
    const reminders = getReminders().slice(0, 8);
    const cards = [
      { label: 'Offen', v: s.anzahl.offen, sub: fmtCurrency(s.summen.offen), c: 'bg-amber-500', i: '⏳', status: 'OFFEN' },
      { label: 'Eingereicht', v: s.anzahl.eingereicht, sub: fmtCurrency(s.summen.eingereicht), c: 'bg-blue-500', i: '📨', status: 'EINGEREICHT' },
      { label: 'Erhalten', v: s.anzahl.erhalten, sub: fmtCurrency(s.summen.erhalten), c: 'bg-emerald-500', i: '✓', status: 'ERHALTEN' },
      { label: 'Gesamt', v: s.anzahl.gesamt, sub: fmtCurrency(s.summen.gesamt), c: 'bg-brand-600', i: '💰', status: '' },
    ];

    const empty = state.gzg.length === 0;

    return `
      <div class="space-y-6">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <h1 class="text-2xl font-bold">Dashboard</h1>
            <p class="text-sm text-slate-500">Geld-zurück-Garantie-Aktionen.</p>
          </div>
          <button class="btn btn-primary" data-action="sync">${I.refresh} Synchronisieren</button>
        </div>

        ${empty ? `
          <div class="card p-6 text-center space-y-3">
            <p class="text-base">Noch keine GZG-Aktionen geladen.</p>
            <p class="text-sm text-slate-500">Klicke auf <strong>Synchronisieren</strong>, um die Liste aus dem Google Sheet zu laden.</p>
            <button class="btn btn-primary mx-auto" data-action="sync">${I.refresh} Jetzt synchronisieren</button>
          </div>` : ''}

        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
          ${cards.map(c => `
            <button type="button" class="card p-5 flex items-center gap-4 text-left hover:shadow-md hover:-translate-y-0.5 transition cursor-pointer w-full" data-action="filterByStatus" data-status="${c.status}">
              <div class="rounded-lg p-3 text-white text-xl ${c.c}">${c.i}</div>
              <div>
                <p class="text-xs uppercase tracking-wide text-slate-500">${c.label}</p>
                <p class="text-2xl font-bold">${c.v}</p>
                <p class="text-sm text-slate-500">${c.sub}</p>
              </div>
            </button>`).join('')}
        </div>

        <div class="grid gap-4 lg:grid-cols-2">
          <div class="card p-5">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="flex items-center gap-2 font-semibold"><span class="text-amber-500">${I.bell}</span>Bald ablaufend (≤14 Tage)</h2>
              <button class="text-sm text-brand-600 hover:underline" data-action="navigate" data-route="aktionen">Alle →</button>
            </div>
            ${reminders.length === 0
              ? '<p class="text-sm text-slate-500">Alles im grünen Bereich. 🎉</p>'
              : `<ul class="space-y-2">${reminders.map(r => {
                  const cls = r.daysLeft < 0 ? 'badge-warn' : r.daysLeft <= 3 ? 'badge-warn' : 'badge-soon';
                  const txt = r.daysLeft < 0 ? `${Math.abs(r.daysLeft)} Tage überfällig` : r.daysLeft === 0 ? 'Heute!' : `noch ${r.daysLeft} Tage`;
                  return `<li class="flex items-center justify-between rounded-lg border border-slate-200 dark:border-slate-800 px-3 py-2 gap-2">
                    <div class="min-w-0">
                      <p class="text-sm font-medium truncate">${esc(r.produktname)}</p>
                      <p class="text-xs text-slate-500">Einsendeschluss: ${fmtDate(r.einsendeschluss)} · ${fmtCurrency(r.cashbackBetrag)}</p>
                    </div>
                    <span class="badge ${cls} flex-none">${txt}</span>
                  </li>`;
                }).join('')}</ul>`}
          </div>

          <div class="card p-5">
            <h2 class="mb-4 font-semibold">Schnellzugriff</h2>
            <div class="grid gap-3 sm:grid-cols-2">
              <button class="btn btn-primary justify-center" data-action="navigate" data-route="import">${I.download} GZG-Liste öffnen</button>
              <button class="btn btn-secondary justify-center" data-action="navigate" data-route="aktionen">Meine Aktionen</button>
              <button class="btn btn-secondary justify-center" data-action="navigate" data-route="statistiken">Statistiken</button>
              <button class="btn btn-secondary justify-center" data-action="exportCSV">${I.download} CSV-Export</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  // ============================================================
  // RENDER: AKTIONEN (meine Cashback-Liste)
  // ============================================================
  function renderAktionen() {
    const items = getFiltered();
    const f = state.filter;
    const total = items.length;
    const totalPages = Math.max(1, Math.ceil(total / f.pageSize));
    const page = Math.min(f.page, totalPages);
    const pageItems = items.slice((page - 1) * f.pageSize, page * f.pageSize);
    const activeFilters = ['status', 'von', 'bis'].filter(k => f[k]).length;
    const sortIcon = (col) => f.sortBy === col ? (f.sortDir === 'asc' ? I.arrowUp : I.arrowDown) : '';

    return `
      <div class="space-y-4">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <h1 class="text-2xl font-bold">Meine Aktionen</h1>
            <p class="text-sm text-slate-500">${total} Einträge</p>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-secondary" data-action="exportCSV">${I.download} CSV</button>
            <button class="btn btn-primary" data-action="newAktion">${I.plus} Neu</button>
          </div>
        </div>

        <div class="card p-4 space-y-3">
          <div class="flex flex-wrap items-center gap-2">
            <div class="relative flex-1 min-w-[220px]">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${I.search}</span>
              <input class="input pl-9" placeholder="Suche..." value="${esc(f.search)}" data-action="search-input" />
              ${f.search ? `<button class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400" data-action="clearSearch">${I.x}</button>` : ''}
            </div>
            <button class="btn btn-secondary relative" data-action="toggleFilter">
              ${I.filter} Filter
              ${activeFilters > 0 ? `<span class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-brand-600 text-xs text-white">${activeFilters}</span>` : ''}
            </button>
          </div>
          ${state.showFilter ? `
            <div class="grid gap-3 sm:grid-cols-2 border-t border-slate-200 dark:border-slate-800 pt-3">
              <label class="block">
                <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Status</span>
                <select class="input" data-action="filter" data-key="status">
                  <option value="">Alle</option>
                  ${STATUS_LIST.map(s => `<option value="${s}" ${f.status === s ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('')}
                </select>
              </label>
              <div class="grid grid-cols-2 gap-2">
                <label class="block">
                  <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Von</span>
                  <input type="date" class="input" value="${f.von}" data-action="filter" data-key="von" />
                </label>
                <label class="block">
                  <span class="text-xs font-medium text-slate-600 dark:text-slate-400 mb-1 block">Bis</span>
                  <input type="date" class="input" value="${f.bis}" data-action="filter" data-key="bis" />
                </label>
              </div>
              ${activeFilters > 0 ? `<button class="btn btn-ghost self-end justify-self-start" data-action="resetFilter">Filter zurücksetzen</button>` : ''}
            </div>` : ''}
        </div>

        <div class="card overflow-hidden">
          ${pageItems.length === 0 ? `
            <div class="p-12 text-center text-slate-500">Keine Aktionen gefunden.</div>
          ` : `
          <!-- Mobile-Karten -->
          <ul class="sm:hidden divide-y divide-slate-200 dark:divide-slate-800">
            ${pageItems.map(a => {
              const dl = daysUntil(a.einsendeschluss);
              let dlBadge = '';
              if (dl != null && (a.status === 'OFFEN' || a.status === 'EINGEREICHT')) {
                const cls = dl < 0 ? 'badge-warn' : dl <= 3 ? 'badge-warn' : dl <= 14 ? 'badge-soon' : '';
                if (cls) {
                  const txt = dl < 0 ? `-${Math.abs(dl)}d` : dl === 0 ? 'heute' : `${dl}d`;
                  dlBadge = `<span class="badge ${cls}">${txt}</span>`;
                }
              }
              const dom = extractDomain(a.aktionsseite);
              const tinyLogo = dom
                ? `<img src="${faviconUrl(dom, 32)}" alt="" class="w-6 h-6 rounded flex-none" loading="lazy" onerror="this.style.display='none'" />`
                : '';
              const rowColor = a.cellColor === 'yellow' ? 'row-yellow' : '';
              return `<li class="p-3 flex flex-col gap-2 ${rowColor}">
                <div class="flex items-start gap-2">
                  ${tinyLogo}
                  <div class="flex-1 min-w-0">
                    <p class="font-medium text-sm leading-snug break-words">${esc(a.produktname)}</p>
                  </div>
                  <span class="badge badge-${a.status} flex-none">${STATUS_LABEL[a.status]}</span>
                </div>
                <div class="flex items-center justify-between gap-2 text-xs text-slate-500">
                  <div class="flex flex-wrap gap-x-3 gap-y-1">
                    ${a.kaufdatum ? `<span><span class="text-slate-400">Kauf:</span> ${fmtDate(a.kaufdatum)}</span>` : ''}
                    ${a.einsendeschluss ? `<span><span class="text-slate-400">Einsenden:</span> ${fmtDate(a.einsendeschluss)} ${dlBadge}</span>` : ''}
                  </div>
                  <span class="font-semibold tabular-nums text-emerald-600 dark:text-emerald-400 text-sm">${fmtCurrency(a.cashbackBetrag)}</span>
                </div>
                <div class="flex justify-end gap-1 pt-1">
                  <button class="btn btn-ghost p-2" data-action="editAktion" data-id="${a.id}" aria-label="Bearbeiten">${I.pencil}</button>
                  <button class="btn btn-ghost p-2 text-red-600" data-action="deleteAktion" data-id="${a.id}" aria-label="Löschen">${I.trash}</button>
                </div>
              </li>`;
            }).join('')}
          </ul>
          <!-- Desktop-Tabelle -->
          <div class="hidden sm:block overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-50 dark:bg-slate-900">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="produktname"><span class="inline-flex items-center gap-1">Produkt ${sortIcon('produktname')}</span></th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="kaufdatum"><span class="inline-flex items-center gap-1">Kaufdatum ${sortIcon('kaufdatum')}</span></th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="einsendeschluss"><span class="inline-flex items-center gap-1">Einsendeschluss ${sortIcon('einsendeschluss')}</span></th>
                  <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="cashbackBetrag"><span class="inline-flex items-center gap-1 justify-end w-full">Cashback ${sortIcon('cashbackBetrag')}</span></th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 cursor-pointer" data-action="sort" data-col="status"><span class="inline-flex items-center gap-1">Status ${sortIcon('status')}</span></th>
                  <th class="px-4 py-3"></th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
                ${pageItems.map(a => {
                  const dl = daysUntil(a.einsendeschluss);
                  let dlBadge = '';
                  if (dl != null && (a.status === 'OFFEN' || a.status === 'EINGEREICHT')) {
                    const cls = dl < 0 ? 'badge-warn' : dl <= 3 ? 'badge-warn' : dl <= 14 ? 'badge-soon' : '';
                    if (cls) {
                      const txt = dl < 0 ? `-${Math.abs(dl)}d` : dl === 0 ? 'heute' : `${dl}d`;
                      dlBadge = `<span class="badge ${cls} ml-2">${txt}</span>`;
                    }
                  }
                  const dom = extractDomain(a.aktionsseite);
                  const tinyLogo = dom
                    ? `<img src="${faviconUrl(dom, 32)}" alt="" class="w-5 h-5 rounded inline-block mr-2 align-middle" loading="lazy" onerror="this.style.display='none'" />`
                    : '';
                  const rowColor = a.cellColor === 'yellow' ? 'row-yellow' : '';
                  return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-900/40 ${rowColor}">
                    <td class="px-4 py-3 font-medium">
                      <div class="flex items-center">${tinyLogo}<span>${esc(a.produktname)}</span></div>
                    </td>
                    <td class="px-4 py-3">${fmtDate(a.kaufdatum)}</td>
                    <td class="px-4 py-3">${fmtDate(a.einsendeschluss)}${dlBadge}</td>
                    <td class="px-4 py-3 text-right tabular-nums">${fmtCurrency(a.cashbackBetrag)}</td>
                    <td class="px-4 py-3"><span class="badge badge-${a.status}">${STATUS_LABEL[a.status]}</span></td>
                    <td class="px-4 py-3 text-right">
                      <div class="flex justify-end gap-1">
                        <button class="btn btn-ghost p-1.5" data-action="editAktion" data-id="${a.id}">${I.pencil}</button>
                        <button class="btn btn-ghost p-1.5 text-red-600" data-action="deleteAktion" data-id="${a.id}">${I.trash}</button>
                      </div>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          `}
          ${totalPages > 1 ? `
            <div class="flex items-center justify-between border-t border-slate-200 dark:border-slate-800 px-4 py-3 text-sm">
              <p class="text-slate-500">Seite ${page} von ${totalPages}</p>
              <div class="flex gap-1">
                <button class="btn btn-ghost" ${page <= 1 ? 'disabled' : ''} data-action="page" data-dir="-1">Zurück</button>
                <button class="btn btn-ghost" ${page >= totalPages ? 'disabled' : ''} data-action="page" data-dir="1">Weiter</button>
              </div>
            </div>` : ''}
        </div>
      </div>`;
  }

  // ============================================================
  // RENDER: GZG-LISTE (Import)
  // ============================================================
  function renderImport() {
    let items = state.gzg.filter(g => !g.importiert);
    const hiddenCount = items.filter(g => g.hidden).length;
    if (!state.showHiddenGzg) items = items.filter(g => !g.hidden);
    if (state.importSearch) {
      const s = state.importSearch.toLowerCase();
      items = items.filter(g =>
        g.produktname.toLowerCase().includes(s) ||
        (g.hersteller || '').toLowerCase().includes(s) ||
        (g.agentur || '').toLowerCase().includes(s)
      );
    }
    items = sortGzg(items, state.importSort || 'einsendeschluss-asc');

    const allSelected = items.length > 0 && items.every(i => state.importSelection.includes(i.id));

    const SORT_OPTIONS = [
      ['einsendeschluss-asc', 'Einsendeschluss (frühester zuerst)'],
      ['einsendeschluss-desc', 'Einsendeschluss (spätester zuerst)'],
      ['aktionsende-asc', 'Aktions-Ende (frühester zuerst)'],
      ['aktionsende-desc', 'Aktions-Ende (spätester zuerst)'],
      ['produktname-asc', 'Produkt A → Z'],
      ['produktname-desc', 'Produkt Z → A'],
      ['hersteller-asc', 'Hersteller A → Z'],
      ['cashback-desc', 'Cashback (höchster zuerst)'],
      ['cashback-asc', 'Cashback (niedrigster zuerst)'],
    ];

    return `
      <div class="space-y-4">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <h1 class="text-2xl font-bold">GZG-Liste</h1>
            <p class="text-sm text-slate-500">${items.length} verfügbare Aktionen · sortiert nach Einsendeschluss</p>
          </div>
          <div class="flex gap-2">
            <label class="btn btn-secondary cursor-pointer">${I.upload} CSV laden<input type="file" accept=".csv,text/csv" class="hidden" data-action="csvUpload" /></label>
            <button class="btn btn-secondary" data-action="sync">${I.refresh} Sync</button>
            <button class="btn btn-primary" ${state.importSelection.length === 0 ? 'disabled' : ''} data-action="doImport">
              ${I.download} Importieren (${state.importSelection.length})
            </button>
          </div>
        </div>

        <div class="card p-4">
          <div class="flex flex-wrap items-center gap-2">
            <div class="relative flex-1 min-w-[220px]">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${I.search}</span>
              <input class="input pl-9" placeholder="Produkt, Hersteller, Agentur..." value="${esc(state.importSearch)}" data-action="importSearch" />
              ${state.importSearch ? `<button class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400" data-action="clearImportSearch">${I.x}</button>` : ''}
            </div>
            <select class="input w-auto" data-action="importSort">
              ${SORT_OPTIONS.map(([v, l]) => `<option value="${v}" ${state.importSort === v ? 'selected' : ''}>${l}</option>`).join('')}
            </select>
            ${hiddenCount > 0 ? `
              <button class="btn btn-secondary" data-action="toggleShowHidden" title="${state.showHiddenGzg ? 'Ausgeblendete verbergen' : 'Ausgeblendete anzeigen'}">
                ${state.showHiddenGzg ? I.eye : I.eyeOff}
                <span class="text-xs">${hiddenCount}</span>
              </button>` : ''}
          </div>
        </div>

        ${state.gzg.length === 0 ? `
          <div class="card p-8 text-center space-y-4">
            <p>Noch keine GZG-Aktionen geladen.</p>
            <div class="flex flex-wrap gap-2 justify-center">
              <button class="btn btn-primary" data-action="sync">${I.refresh} Sync versuchen</button>
              <label class="btn btn-secondary cursor-pointer">${I.upload} CSV-Datei laden<input type="file" accept=".csv,text/csv" class="hidden" data-action="csvUpload" /></label>
            </div>
            <div class="text-xs text-slate-500 max-w-md mx-auto space-y-2 text-left">
              <p><strong>Sync klappt nicht?</strong> Google Sheets blockiert manchmal Browser-Anfragen. Lade die CSV manuell:</p>
              <ol class="list-decimal list-inside space-y-1">
                <li>Im Google Sheet: <em>Datei → Herunterladen → CSV (.csv)</em></li>
                <li>Dann hier <strong>„CSV-Datei laden"</strong> klicken</li>
              </ol>
            </div>
          </div>
        ` : `
        <div class="flex items-center justify-between text-sm text-slate-500 px-1">
          <label class="inline-flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="h-4 w-4 cursor-pointer" ${allSelected ? 'checked' : ''} data-action="toggleAll" />
            <span>Alle auswählen</span>
          </label>
        </div>
        ${items.length === 0
          ? `<div class="card p-12 text-center text-slate-500">Keine passenden Einträge.</div>`
          : `<div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
              ${items.map(g => {
                const dl = daysUntil(g.einsendeschluss);
                let dlBadge = '';
                if (dl != null) {
                  const cls = dl < 0 ? 'badge-warn' : dl <= 3 ? 'badge-warn' : dl <= 14 ? 'badge-soon' : '';
                  const txt = dl < 0 ? `${Math.abs(dl)}d überfällig` : dl === 0 ? 'heute!' : `noch ${dl}d`;
                  dlBadge = `<span class="badge ${cls || 'badge-EINGEREICHT'}">${txt}</span>`;
                }
                const sel = state.importSelection.includes(g.id);
                const colorClass = g.cellColor === 'yellow' ? 'cell-yellow' : '';
                return `<div class="card p-4 flex flex-col gap-3 transition-shadow hover:shadow-md ${colorClass} ${sel ? 'ring-2 ring-brand-500' : ''} ${g.hidden ? 'opacity-50' : ''}">
                  <div class="flex items-start gap-3">
                    ${logoForGzg(g)}
                    <div class="flex-1 min-w-0">
                      <h3 class="font-semibold leading-snug line-clamp-2" title="${esc(g.produktname)}">${esc(g.produktname)}</h3>
                      <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1 text-xs">
                        ${isNewGzg(g) ? `<span class="badge bg-emerald-500 text-white">NEU</span>` : ''}

                    ${g.einsendeschluss ? `<div><dt class="text-slate-400 inline">Einsenden:</dt> <dd class="font-medium inline">${esc(g.einsendeschluss)}</dd></div>` : ''}
                    ${g.kontingent && g.kontingent !== '-' ? `<div class="col-span-2"><dt class="text-slate-400 inline">Kontingent:</dt> <dd class="font-medium inline">${esc(g.kontingent)}</dd></div>` : ''}
                    ${g.agentur ? `<div class="col-span-2"><dt class="text-slate-400 inline">Agentur:</dt> <dd class="font-medium inline">${esc(g.agentur)}</dd></div>` : ''}

                    ${g.mydealzLink ? `<a href="${esc(g.mydealzLink)}" target="_blank" rel="noopener" class="btn btn-secondary text-xs py-1 px-2">${I.link} mydealz</a>` : ''}
                    <button class="btn btn-ghost text-xs py-1 px-2 ml-auto ${g.cellColor === 'yellow' ? 'text-yellow-600 dark:text-yellow-400' : ''}" data-action="toggleAktionspackung" data-id="${g.id}" title="${g.cellColor === 'yellow' ? 'Aktionspackung-Markierung entfernen' : 'Als Aktionspackung markieren (gelb)'}">${I.package}</button>

  function openSettings() {
    const urls = state.sheetUrls && state.sheetUrls.length > 0 ? state.sheetUrls : [''];
    const urlInputs = urls.map((u, i) => `
      <div class="flex gap-2 items-center" data-url-row="${i}">
        <input class="input flex-1" data-sheet-url value="${esc(u)}" placeholder="https://docs.google.com/spreadsheets/d/.../edit?gid=..." />
        <button class="btn btn-ghost p-1.5 text-red-600" data-remove-url="${i}" title="Entfernen">${I.trash}</button>
      </div>`).join('');

    const body = `
      <div class="space-y-4 text-sm">
        <div class="card p-4 space-y-3">
          <h3 class="font-semibold">Google Sheets-Quellen</h3>
          <p class="text-xs text-slate-500">Pro Tab eine URL. Beim Sync werden alle Tabs zusammengefasst (z.B. „Aktiv" + „Archiv"). Sheet muss öffentlich für alle mit dem Link sein.</p>
          <div class="space-y-2" id="url-list">${urlInputs}</div>
          <button class="btn btn-ghost text-sm" id="add-url">${I.plus} Weitere URL hinzufügen</button>
          <div class="flex flex-wrap gap-2 pt-2 border-t border-slate-200 dark:border-slate-800">
            <button class="btn btn-secondary" id="save-sheet-url">Speichern</button>
            <button class="btn btn-primary" id="sync-now">${I.refresh} Jetzt synchronisieren</button>
          </div>
        </div>
        <div class="card p-4">
          <h3 class="font-semibold mb-2">Daten</h3>
          <p class="text-slate-500 mb-3">${state.aktionen.length} Aktionen, ${state.gzg.length} GZG-Einträge.</p>
          <div class="flex flex-wrap gap-2">
            <button class="btn btn-secondary" id="export-json">${I.download} Backup als JSON</button>
            <label class="btn btn-secondary cursor-pointer">${I.upload} JSON laden<input type="file" accept=".json" class="hidden" id="import-json" /></label>
          </div>
        </div>
        <div class="card p-4">
          <h3 class="font-semibold mb-2 text-red-600">Zurücksetzen</h3>
          <p class="text-slate-500 mb-3">Löscht alle Aktionen und GZG-Daten.</p>
          <button class="btn btn-danger" id="reset-all">Alles zurücksetzen</button>
        </div>
      </div>`;
    openModal({ title: 'Einstellungen', body, size: 'md' });

    function collectUrls() {
      return Array.from(document.querySelectorAll('[data-sheet-url]'))
        .map(i => i.value.trim()).filter(v => v);
    }
    document.getElementById('add-url').onclick = () => {
      const list = document.getElementById('url-list');
      const idx = list.children.length;
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center';
      div.dataset.urlRow = String(idx);
      div.innerHTML = `
        <input class="input flex-1" data-sheet-url value="" placeholder="https://docs.google.com/spreadsheets/d/.../edit?gid=..." />
        <button class="btn btn-ghost p-1.5 text-red-600" data-remove-url="${idx}" title="Entfernen">${I.trash}</button>`;
      list.appendChild(div);
    };
    document.getElementById('url-list').addEventListener('click', (e) => {
      const t = e.target.closest('[data-remove-url]');
      if (t) t.closest('[data-url-row]').remove();
    });
    document.getElementById('save-sheet-url').onclick = () => {
      setState({ sheetUrls: collectUrls() });
      toast('Sheet-URLs gespeichert.', 'success');
    };
    document.getElementById('sync-now').onclick = () => {
      setState({ sheetUrls: collectUrls() });
      closeModal();
      syncFromGoogleSheets();
    };
    document.getElementById('export-json').onclick = () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `gzg-backup-${new Date().toISOString().substring(0, 10)}.json`;
      a.click(); URL.revokeObjectURL(url);
      toast('Backup erstellt.', 'success');
    };
    document.getElementById('import-json').onchange = e => {
      const f = e.target.files?.[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => {
        try {
          const d = JSON.parse(ev.target.result);
          if (!Array.isArray(d.aktionen) || !Array.isArray(d.gzg)) throw new Error('Ungültiges Format');
          state = { ...state, ...d }; persist(); render(); closeModal();
          toast('Daten geladen.', 'success');
        } catch (err) { toast('Fehler: ' + err.message, 'error'); }
      };
      r.readAsText(f);
    };
    document.getElementById('reset-all').onclick = () => {
      if (!confirm('Wirklich alle Daten löschen?')) return;
      Store.reset();
      state = { ...initialState, theme: state.theme };
      persist(); render(); closeModal();
      toast('Daten zurückgesetzt.', 'success');
    };
  }

  // ============================================================
  // EVENTS
  // ============================================================
  function bindEvents() {
    const app = document.getElementById('app');

    app.onclick = (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      const a = t.dataset.action;

      if (a === 'navigate') setState({ route: t.dataset.route });
      else if (a === 'filterByStatus') {
        const status = t.dataset.status || '';
        setState({
          route: 'aktionen',
          filter: { ...state.filter, status, page: 1 },
          showFilter: status ? true : state.showFilter,
        });
      }
      else if (a === 'toggleTheme') setState({ theme: state.theme === 'dark' ? 'light' : 'dark' });
      else if (a === 'settings') openSettings();
      else if (a === 'sync') syncFromGoogleSheets();
      else if (a === 'newAktion') openAktionForm(null);
      else if (a === 'editAktion') openAktionForm(state.aktionen.find(x => x.id === Number(t.dataset.id)));
      else if (a === 'deleteAktion') openDeleteConfirm(Number(t.dataset.id));
      else if (a === 'exportCSV') exportCSV();
      else if (a === 'toggleFilter') setState({ showFilter: !state.showFilter });
      else if (a === 'clearSearch') setState({ filter: { ...state.filter, search: '', page: 1 } });
      else if (a === 'sort') {
        const c = t.dataset.col;
        const dir = state.filter.sortBy === c && state.filter.sortDir === 'asc' ? 'desc' : 'asc';
        setState({ filter: { ...state.filter, sortBy: c, sortDir: dir } });
      }
      else if (a === 'page') setState({ filter: { ...state.filter, page: Math.max(1, state.filter.page + Number(t.dataset.dir)) } });
      else if (a === 'resetFilter') setState({ filter: { ...state.filter, status: '', von: '', bis: '', page: 1 } });
      else if (a === 'toggleAll') {
        const items = state.gzg.filter(g => !g.importiert).filter(g => {
          if (!state.importSearch) return true;
          const s = state.importSearch.toLowerCase();
          return g.produktname.toLowerCase().includes(s) || (g.hersteller || '').toLowerCase().includes(s) || (g.agentur || '').toLowerCase().includes(s);
        });
        const ids = items.map(i => i.id);
        const all = ids.every(id => state.importSelection.includes(id));
        setState({ importSelection: all ? [] : ids });
      }
      else if (a === 'toggleOne') {
        const id = Number(t.dataset.id);
        setState({ importSelection: state.importSelection.includes(id) ? state.importSelection.filter(x => x !== id) : [...state.importSelection, id] });
      }
      else if (a === 'doImport') importGZG(state.importSelection);
      else if (a === 'previewGzg') openGzgPreview(Number(t.dataset.id));
      else if (a === 'clearImportSearch') setState({ importSearch: '' });
      else if (a === 'toggleHide') {
        const id = Number(t.dataset.id);
        const target = state.gzg.find(g => g.id === id);
        const willBeHidden = target && !target.hidden;
        const newGzg = state.gzg.map(g => g.id === id ? { ...g, hidden: !g.hidden } : g);
        setState({
          gzg: newGzg,
          importSelection: state.importSelection.filter(x => x !== id),
          showHiddenGzg: willBeHidden ? false : state.showHiddenGzg,
        });
      }
      else if (a === 'toggleShowHidden') setState({ showHiddenGzg: !state.showHiddenGzg });
      else if (a === 'toggleAktionspackung') {
        const id = Number(t.dataset.id);
        const target = state.gzg.find(g => g.id === id);
        if (!target) return;
        const newColor = target.cellColor === 'yellow' ? null : 'yellow';
        const newGzg = state.gzg.map(g => g.id === id ? { ...g, cellColor: newColor } : g);
        const newAktionen = state.aktionen.map(a => a.gzgId === id ? { ...a, cellColor: newColor } : a);
        setState({ gzg: newGzg, aktionen: newAktionen });
      }
    };

    app.oninput = (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      if (t.dataset.action === 'search-input') {
        clearTimeout(window._st);
        window._st = setTimeout(() => setState({ filter: { ...state.filter, search: t.value, page: 1 } }), 250);
      } else if (t.dataset.action === 'importSearch') {
        clearTimeout(window._it);
        window._it = setTimeout(() => setState({ importSearch: t.value }), 250);
      }
    };

    app.onchange = (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      if (t.dataset.action === 'filter') setState({ filter: { ...state.filter, [t.dataset.key]: t.value, page: 1 } });
      else if (t.dataset.action === 'importSort') setState({ importSort: t.value });
      else if (t.dataset.action === 'csvUpload') {
        const f = t.files?.[0];
        if (f) importCsvFile(f);
        t.value = '';
      }
    };
  }

  // ============================================================
  // RENDER MAIN
  // ============================================================
  function render() {
    applyTheme();
    let content;
    switch (state.route) {
      case 'aktionen': content = renderAktionen(); break;
      case 'import': content = renderImport(); break;
      case 'statistiken': content = renderStatistiken(); break;
      default: content = renderDashboard();
    }
    document.getElementById('app').innerHTML = renderShell(content);

    if (state.route === 'aktionen') {
      const inp = document.querySelector('[data-action="search-input"]');
      if (inp && document.activeElement !== inp && inp.value) {
        const v = inp.value; inp.focus(); inp.setSelectionRange(v.length, v.length);
      }
    }
  }

  // ============================================================
  // INIT
  // ============================================================
  bindEvents();
  render();

  // Beim allerersten Aufruf gleich synchronisieren
  if (!state.lastSync && state.gzg.length === 0 && state.sheetUrls && state.sheetUrls.length > 0) {
    syncFromGoogleSheets();
  }
  </script>
</body>
</html>
